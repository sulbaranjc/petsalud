<!doctype html>
<html th:replace="~{layout/base :: layout('Dashboard', ~{::main})}"
      lang="es"
      xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='dashboard'">

  <style>
    .mascota-list-avatar {
      width: 36px; height: 36px;
      border-radius: 50%; object-fit: cover;
      border: 2px solid var(--ps-border); flex-shrink: 0;
      transition: border-color .2s, transform .2s;
    }
    .mascota-list-avatar-placeholder {
      width: 36px; height: 36px;
      border-radius: 50%; background: var(--ps-primary-light);
      border: 2px solid var(--ps-border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--ps-primary); font-size: .85rem; opacity: .8;
      transition: border-color .2s, transform .2s;
    }
    .ps-table tbody tr:hover .mascota-list-avatar,
    .ps-table tbody tr:hover .mascota-list-avatar-placeholder {
      border-color: var(--ps-primary); transform: scale(1.08);
    }
    .mascota-nombre-cell { display: flex; align-items: center; gap: .55rem; }
  </style>

  <!-- Encabezado -->
  <div class="page-header">
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Resumen general de la clínica</p>
  </div>

  <!-- Tarjetas de estadísticas -->
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-card-body">
        <span class="stat-card-value" th:text="${stats.citasHoy}">0</span>
        <span class="stat-card-label">Citas de hoy</span>
      </div>
      <div class="stat-card-icon icon-blue">
        <i class="bi bi-calendar2-check-fill"></i>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-card-body">
        <span class="stat-card-value" th:text="${stats.veterinariosActivos}">0</span>
        <span class="stat-card-label">Veterinarios activos</span>
      </div>
      <div class="stat-card-icon icon-teal">
        <i class="bi bi-person-badge-fill"></i>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-card-body">
        <span class="stat-card-value" th:text="${stats.mascotasRegistradas}">0</span>
        <span class="stat-card-label">Mascotas registradas</span>
      </div>
      <div class="stat-card-icon icon-purple">
        <i>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 494.585 494.585" width="1.5em" height="1.5em" fill="currentColor" aria-hidden="true">
            <path d="M314.438,52.675c-21.633,0-39.144,0-39.144,0l-12.13-37.248c-6.664-20.57-17.529-20.57-24.18,0c-6.725,20.582-12.125,37.248-12.125,37.248h-39.176c-21.632,0-24.985,10.329-7.486,23.035c17.543,12.685,31.708,23.009,31.708,23.009l-12.135,37.248c-6.669,20.577,2.105,26.959,19.639,14.241c17.474-12.713,31.652-23.025,31.652-23.025l31.676,23.025c17.502,12.708,26.257,6.336,19.588-14.241c-6.679-20.582-12.088-37.248-12.088-37.248l31.699-23.009C339.41,63.004,336.06,52.675,314.438,52.675z"/>
            <path d="M168.852,185.596c0,0-14.736,9.89-19.963,57.937c27.557,35.685,61.804,29.851,76.883,24.871c1.37-0.462,3.099-2.697,3.19-4.121c2.002-34.308-26.327-80.045-36.532-95.313C184.221,172.241,176.231,177.534,168.852,185.596z"/>
            <path d="M313.261,96.497l4.91,15.135c3.234,9.995,3.743,18.505,1.899,25.62c57.069,27.305,96.679,85.438,96.679,152.797c0,93.449-76.022,169.467-169.464,169.467c-0.997,0-1.976-0.14-2.961-0.159l-0.272-6.318c-0.126-2.824,1.92-5.923,4.564-6.908l32.789-12.302c0,0,15.378,0.858,21.776-10.684c3.239-5.819,6.25-9.885,8.457-12.507c1.811-2.156,1.787-5.232-0.247-7.202c-6.692-6.482-20.167-20.68-21.44-31.53c-1.713-14.524-22.201-26.486-48.689-28.189c0,0-14.064-10.813-15.01-29.473c-0.151-2.828-2.263-5.638-5.01-4.956c-7.08,1.736-19.093,10.827-19.69,52.332c0,0-37.61,19.06-41.115,73.679c-2.994-1.792-5.993-3.561-8.865-5.54c1.367-16.601,5.563-29.827,10.478-39.81c9.756-19.835,23.452-30.863,30.438-35.517c1.505-40.968,14.799-52.938,25.9-55.679c3.409-0.84,6.987-0.111,9.822,2.007c3.228,2.404,5.283,6.361,5.502,10.613c0.57,11.01,7.078,18.738,10.167,21.81c5.001,0.462,9.78,1.26,14.27,2.352l0.42-3.864l3.431-33.374c0.583-5.629,5.651-10.385,11.252-11.183c21.277-3.099,68.686-15.704,71.771-66.923c0.341-5.657-4.42-11.338-9.927-12.678l-45.131-11.019c0,0-1.288-10.893-14.095-15.371c-9.334-3.274-41.488-21.742-73.121-15.227c11.959,18.206,38.566,63.083,36.464,98.979c-0.315,5.647-4.805,11.477-10.195,13.255c-5.181,1.717-14.489,4.116-25.8,4.116c-16.386,0-36.963-5.036-55.505-24.414c-0.364,6.151-0.572,12.816-0.607,20.018c-0.21,37.164-47.415,72.4-47.415,72.4l-5.638,11.672c-10.284-21.86-16.209-46.152-16.209-71.873c0-69.08,41.595-128.541,101.007-154.9c-1.234-6.697-0.637-14.463,2.298-23.524l5.521-16.939c-83.282,25.891-143.91,103.672-143.91,195.364c0,112.775,91.757,204.535,204.535,204.535c112.778,0,204.532-91.76,204.532-204.535C451.817,200.351,393.759,124.012,313.261,96.497z M270.496,374.449c3.184,0,5.769,2.572,5.769,5.769c0,3.192-2.585,5.765-5.769,5.765c-3.183,0-5.764-2.572-5.764-5.765C264.732,377.021,267.313,374.449,270.496,374.449z M264.732,207.882c3.192,0,5.764,2.576,5.764,5.766c0,3.19-2.571,5.762-5.764,5.762c-3.196,0-5.773-2.571-5.773-5.762C258.964,210.458,261.55,207.882,264.732,207.882z"/>
          </svg>
        </i>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-card-body">
        <span class="stat-card-value" th:text="${stats.propietarios}">0</span>
        <span class="stat-card-label">Propietarios</span>
      </div>
      <div class="stat-card-icon icon-orange">
        <i class="bi bi-people-fill"></i>
      </div>
    </div>

  </div>

  <!-- Grid inferior -->
  <div class="dashboard-grid">

    <!-- Citas del día -->
    <div class="ps-card">
      <div class="ps-card-header">
        <h2 class="ps-card-title">Citas de hoy</h2>
        <a th:href="@{/citas(fecha=${#temporals.format(today, 'yyyy-MM-dd')})}"
           class="link-see-all">Ver todas</a>
      </div>
      <table class="ps-table">
        <thead>
          <tr>
            <th>Mascota</th>
            <th>Propietario</th>
            <th>Hora</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cita : ${citasHoy}">
            <td>
              <div class="mascota-nombre-cell">
                <img th:if="${cita.fotoUrlMascota != null and !#strings.isEmpty(cita.fotoUrlMascota)}"
                     th:src="${cita.fotoUrlMascota}"
                     th:alt="${cita.nombreMascota}"
                     class="mascota-list-avatar">
                <div th:if="${cita.fotoUrlMascota == null or #strings.isEmpty(cita.fotoUrlMascota)}"
                     class="mascota-list-avatar-placeholder"
                     th:title="${cita.nombreMascota}">
                  <i class="bi bi-heart-fill"></i>
                </div>
                <div>
                  <strong th:text="${cita.nombreMascota}"></strong>
                  <small class="text-muted d-block" th:text="${cita.nombreEspecie}"></small>
                </div>
              </div>
            </td>
            <td th:text="${cita.nombrePropietario}"></td>
            <td th:text="${#temporals.format(cita.fechaHora, 'HH:mm')}"></td>
            <td>
              <th:block th:switch="${cita.nombreEstadoCita}">
                <span th:case="'Confirmada'"          class="ps-badge badge-success"  th:text="${cita.nombreEstadoCita}"></span>
                <span th:case="'En curso'"            class="ps-badge badge-primary"  th:text="${cita.nombreEstadoCita}"></span>
                <span th:case="'En consulta'"         class="ps-badge badge-primary"  th:text="${cita.nombreEstadoCita}"></span>
                <span th:case="'En sala de espera'"   class="ps-badge badge-info"     th:text="${cita.nombreEstadoCita}"></span>
                <span th:case="'Completada'"          class="ps-badge badge-neutral"  th:text="${cita.nombreEstadoCita}"></span>
                <span th:case="'Cancelada'"           class="ps-badge badge-danger"   th:text="${cita.nombreEstadoCita}"></span>
                <span th:case="'No asistió'"          class="ps-badge badge-danger"   th:text="${cita.nombreEstadoCita}"></span>
                <span th:case="*"                     class="ps-badge badge-warning"  th:text="${cita.nombreEstadoCita}"></span>
              </th:block>
            </td>
            <td>
              <div class="table-actions">
                <a th:if="${cita.idConsulta == null
                             and cita.nombreEstadoCita != 'Cancelada'
                             and cita.nombreEstadoCita != 'Completada'
                             and cita.nombreEstadoCita != 'No asistió'}"
                   th:href="@{/consultas/nueva(idCita=${cita.id})}"
                   class="action-btn action-btn-success" title="Atender cita">
                  <i class="bi bi-clipboard2-pulse-fill"></i>
                </a>
                <a th:if="${cita.idConsulta != null}"
                   th:href="@{/consultas/{id}(id=${cita.idConsulta})}"
                   class="action-btn action-btn-info" title="Ver consulta">
                  <i class="bi bi-eye-fill"></i>
                </a>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(citasHoy)}">
            <td colspan="5" class="text-center text-muted py-4">No hay citas programadas para hoy.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Consultas recientes -->
    <div class="ps-card">
      <div class="ps-card-header">
        <h2 class="ps-card-title">Consultas recientes</h2>
        <a th:href="@{/consultas}" class="link-see-all">Ver todas</a>
      </div>
      <table class="ps-table">
        <thead>
          <tr>
            <th>Mascota</th>
            <th>Veterinario</th>
            <th>Fecha</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="con : ${consultasRecientes}">
            <td>
              <div class="mascota-nombre-cell">
                <img th:if="${con.fotoUrlMascota != null and !#strings.isEmpty(con.fotoUrlMascota)}"
                     th:src="${con.fotoUrlMascota}"
                     th:alt="${con.nombreMascota}"
                     class="mascota-list-avatar">
                <div th:if="${con.fotoUrlMascota == null or #strings.isEmpty(con.fotoUrlMascota)}"
                     class="mascota-list-avatar-placeholder"
                     th:title="${con.nombreMascota}">
                  <i class="bi bi-heart-fill"></i>
                </div>
                <div>
                  <strong th:text="${con.nombreMascota}"></strong>
                  <small class="text-muted d-block" th:text="${con.nombreEspecie}"></small>
                </div>
              </div>
            </td>
            <td th:text="${con.nombreVeterinario}"></td>
            <td th:text="${#temporals.format(con.fechaHora, 'dd/MM/yyyy')}"></td>
            <td>
              <a th:href="@{/consultas/{id}(id=${con.id})}"
                 class="action-btn action-btn-info" title="Ver consulta">
                <i class="bi bi-eye-fill"></i>
              </a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(consultasRecientes)}">
            <td colspan="4" class="text-center text-muted py-4">No hay consultas registradas.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</main>
</body>
</html>
