<!doctype html>
<html th:replace="~{layout/base :: layout('Razas', ~{::main})}" lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='cat-razas'">

  <style>
    .razas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(315px, 315px));
      gap: 1.25rem;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .raza-card {
      background: var(--ps-card-bg);
      border: 1px solid var(--ps-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      width: 315px;
      transition: box-shadow .22s, transform .22s;
    }

    .raza-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
    }

    .raza-card-img {
      position: relative;
      width: 100%;
      height: 222px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--ps-primary-light);
    }

    .raza-card-img img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .raza-card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ps-primary);
      font-size: 3rem;
      opacity: .35;
    }

    .raza-card-status {
      position: absolute;
      top: .55rem;
      right: .55rem;
      padding: .2rem .55rem;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .025em;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1;
    }

    .raza-status-active   { background: rgba(220,252,231,.9); color: #15803d; }
    .raza-status-inactive { background: rgba(241,245,249,.9); color: var(--ps-text-muted); }

    .raza-card-body {
      padding: .85rem 1rem .9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      flex: 1;
    }

    .raza-card-name {
      margin: 0;
      font-size: .93rem;
      font-weight: 700;
      color: var(--ps-text);
      text-align: center;
      line-height: 1.3;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .raza-card-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      padding-top: .55rem;
      margin-top: .35rem;
      border-top: 1px solid var(--ps-border);
      width: 100%;
    }

    @media (max-width: 480px) {
      .razas-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .raza-card { width: 100%; }
    }
  </style>

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title">Razas</h1>
      <p class="page-subtitle">Catálogo de razas por especie</p>
    </div>
    <a th:href="@{/catalogos/razas/nueva}" class="btn-ps-primary">
      <i class="bi bi-plus-lg"></i> Nueva Raza
    </a>
  </div>

  <!-- Mensaje flash -->
  <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${mensajeExito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Filtros -->
  <form th:action="@{/catalogos/razas}" method="get">
    <div class="ps-card filter-bar">
      <div class="row g-2 align-items-center">
        <div class="col-md-4">
          <div class="filter-search-wrap">
            <i class="bi bi-search"></i>
            <input type="text" name="q" class="filter-input"
                   placeholder="Buscar raza..."
                   th:value="${q}">
          </div>
        </div>
        <div class="col-md-3">
          <select name="idEspecie" class="filter-select">
            <option value="">Todas las especies</option>
            <option th:each="especie : ${especies}"
                    th:value="${especie.id}"
                    th:text="${especie.nombre}"
                    th:selected="${especie.id == idEspecieFiltro}">
            </option>
          </select>
        </div>
        <div class="col-md-2">
          <select name="activo" class="filter-select">
            <option value="">Estado</option>
            <option value="1" th:selected="${activoFiltro == '1'}">Activo</option>
            <option value="0" th:selected="${activoFiltro == '0'}">Inactivo</option>
          </select>
        </div>
        <div class="col-md-3 d-flex gap-2 justify-content-end flex-wrap">
          <input type="hidden" name="sortBy" value="nombre">
          <button type="submit"
                  th:name="sortDir"
                  th:value="${sortDir == 'asc' ? 'desc' : 'asc'}"
                  class="btn-ps-outline">
            <i th:class="${sortDir == 'asc'} ? 'bi bi-sort-alpha-down' : 'bi bi-sort-alpha-up-alt'"></i>
            <span th:text="${sortDir == 'asc'} ? 'A→Z' : 'Z→A'"></span>
          </button>
          <button type="submit" name="sortDir" th:value="${sortDir}" class="btn-ps-outline">
            <i class="bi bi-funnel"></i> Filtrar
          </button>
          <a th:href="@{/catalogos/razas}" class="btn-ps-outline">
            <i class="bi bi-x-lg"></i> Limpiar
          </a>
        </div>
      </div>
    </div>
  </form>

  <!-- Grid de cards -->
  <div th:if="${!#lists.isEmpty(razas)}" class="razas-grid">
    <div class="raza-card" th:each="raza : ${razas}">

      <div class="raza-card-img">
        <img th:if="${raza.fotoUrl != null}"
             th:src="${raza.fotoUrl}"
             th:alt="${raza.nombre}">
        <div th:unless="${raza.fotoUrl != null}" class="raza-card-placeholder">
          <i class="bi bi-image"></i>
        </div>
        <span th:if="${raza.activo}"     class="raza-card-status raza-status-active">Activo</span>
        <span th:unless="${raza.activo}" class="raza-card-status raza-status-inactive">Inactivo</span>
      </div>

      <div class="raza-card-body">
        <h3 class="raza-card-name" th:text="${raza.nombre}"></h3>
        <span class="ps-badge badge-info" th:text="${raza.nombreEspecie}"></span>

        <div class="raza-card-footer">
          <a th:href="@{/catalogos/razas/{id}/editar(id=${raza.id})}"
             class="action-btn action-btn-edit" title="Editar">
            <i class="bi bi-pencil-fill"></i>
          </a>
          <form th:action="@{/catalogos/razas/{id}/toggle(id=${raza.id})}"
                method="post" style="display:inline;">
            <button type="submit"
                    th:class="${raza.activo} ? 'action-btn action-btn-danger' : 'action-btn action-btn-success'"
                    th:title="${raza.activo} ? 'Desactivar' : 'Activar'">
              <i th:class="${raza.activo} ? 'bi bi-toggle-on' : 'bi bi-toggle-off'"></i>
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <!-- Estado vacío -->
  <div th:if="${#lists.isEmpty(razas)}" class="ps-card text-center py-5 text-muted">
    <i class="bi bi-search" style="font-size:2rem; opacity:.35;"></i>
    <p class="mt-2 mb-0">No hay razas registradas.</p>
  </div>

  <!-- Paginación -->
  <div th:if="${pagina.totalElements > 0}" class="ps-card" style="padding:.75rem 1.25rem;">
    <div class="ps-pagination" style="border-top:none; padding-top:0; margin-top:0;">
      <span class="pagination-info"
            th:text="'Mostrando ' + ${pagina.from} + '–' + ${pagina.to}
                     + ' de ' + ${pagina.totalElements} + ' registros'">
      </span>
      <div class="pagination-controls">
        <a th:if="${pagina.hasPrevious()}"
           th:href="@{/catalogos/razas(q=${q}, idEspecie=${idEspecieFiltro}, activo=${activoFiltro}, sortBy=${sortBy}, sortDir=${sortDir}, page=${pagina.pageNumber - 1})}"
           class="page-btn"><i class="bi bi-chevron-left"></i></a>
        <span th:unless="${pagina.hasPrevious()}" class="page-btn disabled">
          <i class="bi bi-chevron-left"></i></span>

        <th:block th:each="p : ${ventanaPaginas}">
          <span th:if="${p == -1}" class="page-ellipsis">…</span>
          <a th:unless="${p == -1}"
             th:href="@{/catalogos/razas(q=${q}, idEspecie=${idEspecieFiltro}, activo=${activoFiltro}, sortBy=${sortBy}, sortDir=${sortDir}, page=${p})}"
             th:class="${p == pagina.pageNumber} ? 'page-btn active' : 'page-btn'"
             th:text="${p}"></a>
        </th:block>

        <a th:if="${pagina.hasNext()}"
           th:href="@{/catalogos/razas(q=${q}, idEspecie=${idEspecieFiltro}, activo=${activoFiltro}, sortBy=${sortBy}, sortDir=${sortDir}, page=${pagina.pageNumber + 1})}"
           class="page-btn"><i class="bi bi-chevron-right"></i></a>
        <span th:unless="${pagina.hasNext()}" class="page-btn disabled">
          <i class="bi bi-chevron-right"></i></span>
      </div>
    </div>
  </div>

</main>
</body>
</html>
