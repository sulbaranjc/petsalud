<!doctype html>
<html th:replace="~{layout/base :: layout(${raza.id == null} ? 'Nueva Raza' : 'Editar Raza', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='cat-razas'"
      style="display:flex; flex-direction:column; min-height:calc(100vh - var(--topbar-height));">

  <style>
    .raza-avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      padding: 1.25rem 0 1.1rem;
      border-bottom: 1px solid var(--ps-border);
      margin-bottom: .5rem;
    }

    .raza-avatar-ring {
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ps-primary) 0%, #60a5fa 100%);
      box-shadow: 0 4px 18px rgba(37,99,235,.25);
      transition: transform .22s, box-shadow .22s;
      cursor: pointer;
      position: relative;
    }

    .raza-avatar-ring:hover {
      transform: scale(1.07) translateY(-3px);
      box-shadow: 0 10px 32px rgba(37,99,235,.4);
    }

    .raza-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--ps-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .raza-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .raza-avatar-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      color: var(--ps-primary);
      opacity: .65;
    }

    .raza-avatar-placeholder i    { font-size: 2.8rem; }
    .raza-avatar-placeholder span {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .raza-avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(37,99,235,.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      transition: opacity .25s ease;
      gap: .25rem;
    }

    .raza-avatar-overlay i    { font-size: 1.8rem; }
    .raza-avatar-overlay span { font-size: .68rem; font-weight: 600; letter-spacing: .04em; }

    .raza-avatar-ring:hover .raza-avatar-overlay { opacity: 1; }

    .raza-avatar-hint {
      font-size: .78rem;
      color: var(--ps-text-muted);
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    .raza-avatar-hint i    { font-size: .85rem; color: var(--ps-primary); }
    .raza-avatar-formats   { font-size: .72rem; color: var(--ps-text-light); }
  </style>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: .5rem 0 2rem;">

    <div style="width:100%; max-width:640px; text-align:center; margin-bottom:1.25rem; padding: 0 1rem;">
      <h1 class="page-title" th:text="${raza.id == null} ? 'Nueva Raza' : 'Editar Raza'"></h1>
      <p class="page-subtitle" style="margin-bottom:0;">Catálogo de razas por especie</p>
    </div>

  <div class="ps-card" style="max-width: 640px; width:100%;">
    <form th:action="${raza.id == null} ? @{/catalogos/razas} : @{/catalogos/razas/{id}/editar(id=${raza.id})}"
          th:object="${raza}"
          method="post"
          enctype="multipart/form-data"
          novalidate>

      <div class="mb-1">
        <a th:href="@{/catalogos/razas}"
           style="display:inline-flex; align-items:center; gap:.35rem; font-size:.82rem;
                  font-weight:600; color:var(--ps-text-muted); text-decoration:none;
                  transition:color .2s;"
           onmouseover="this.style.color='var(--ps-primary)'"
           onmouseout="this.style.color='var(--ps-text-muted)'">
          <i class="bi bi-arrow-left"></i> Volver al listado
        </a>
      </div>

      <!-- Imagen representativa — avatar interactivo (arriba de los campos) -->
      <div class="raza-avatar-wrap">

        <div class="raza-avatar-ring" onclick="document.getElementById('fotoFile').click()" title="Cambiar imagen">
          <div class="raza-avatar">

            <!-- Imagen existente -->
            <img th:if="${raza.fotoUrl != null and !#strings.isEmpty(raza.fotoUrl)}"
                 id="razaAvatarImg"
                 th:src="${raza.fotoUrl}"
                 alt="Imagen de la raza">

            <!-- Placeholder cuando no hay imagen -->
            <div th:if="${raza.fotoUrl == null or #strings.isEmpty(raza.fotoUrl)}"
                 id="razaAvatarPlaceholder"
                 class="raza-avatar-placeholder">
              <i class="bi bi-image"></i>
              <span>Sin imagen</span>
            </div>

            <!-- Overlay de cámara al hover -->
            <div class="raza-avatar-overlay">
              <i class="bi bi-camera-fill"></i>
              <span th:text="${raza.id == null} ? 'Subir imagen' : 'Cambiar imagen'">Subir imagen</span>
            </div>
          </div>
        </div>

        <div class="raza-avatar-hint">
          <i class="bi bi-camera"></i>
          <span th:text="${raza.id == null} ? 'Haz clic en la imagen para subir una foto' : 'Haz clic en la imagen para cambiar la foto'">
            Haz clic en la imagen para subir una foto
          </span>
        </div>
        <span class="raza-avatar-formats">JPG · PNG · WEBP · máx. 5 MB</span>

        <!-- Campo file oculto — se activa al clicar el avatar -->
        <input type="file" id="fotoFile" name="fotoFile" accept="image/*" style="display:none;">

        <!-- Preserva la URL existente al enviar sin nueva imagen -->
        <input type="hidden" th:field="*{fotoUrl}">

        <div th:if="${errorFoto}" class="text-danger small" th:text="${errorFoto}"></div>
      </div>
      <!-- ── / Imagen ─────────────────────────────────────────────────────────── -->

      <!-- Nombre -->
      <div class="mb-3">
        <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input type="text"
               id="nombre"
               th:field="*{nombre}"
               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ej: Labrador Retriever, Siamés"
               maxlength="100">
        <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
          <span th:errors="*{nombre}"></span>
        </div>
      </div>

      <!-- Bloque inferior: columna izquierda (campos) + columna derecha (imagen especie) -->
      <div style="display:flex; gap:1rem; align-items:stretch;">

        <!-- ── Columna izquierda: Especie, Activo, Botones ─────────────────── -->
        <div style="flex:0 0 44%; display:flex; flex-direction:column; justify-content:space-between;">

          <!-- Especie -->
          <div class="mb-3">
            <label for="idEspecie" class="form-label fw-semibold">Especie <span class="text-danger">*</span></label>
            <select id="idEspecie"
                    th:field="*{idEspecie}"
                    th:classappend="${#fields.hasErrors('idEspecie')} ? 'is-invalid'"
                    class="form-select">
              <option value="" data-foto="">-- Seleccione --</option>
              <option th:each="especie : ${especies}"
                      th:value="${especie.id}"
                      th:text="${especie.nombre}"
                      th:attr="data-foto=${especie.fotoUrl}">
              </option>
            </select>
            <div th:if="${#fields.hasErrors('idEspecie')}" class="invalid-feedback" style="display:block;">
              <span th:errors="*{idEspecie}"></span>
            </div>
          </div>

          <!-- Activo (solo en edición) -->
          <div class="mb-3" th:if="${raza.id != null}">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
              <label class="form-check-label fw-semibold" for="activo">Activo</label>
            </div>
          </div>

          <!-- Acciones -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn-ps-primary">
              <i class="bi bi-floppy-fill"></i>
              <span th:text="${raza.id == null} ? 'Guardar' : 'Actualizar'"></span>
            </button>
            <a th:href="@{/catalogos/razas}" class="btn-ps-outline">Cancelar</a>
          </div>

        </div>

        <!-- ── Columna derecha: imagen de la especie seleccionada ──────────── -->
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:.4rem;">
          <div id="especieImgWrap"
               style="width:100%; flex:1; min-height:0; border-radius:var(--radius-md);
                      overflow:hidden; border:1px solid var(--ps-border);
                      background:var(--ps-primary-light);
                      display:flex; align-items:center; justify-content:center;">
            <img id="especiePreviewImg"
                 alt="Imagen de la especie"
                 style="width:100%; height:100%; object-fit:cover; display:none;">
            <span id="especiePreviewPlaceholder"
                  style="color:var(--ps-primary); font-size:2.8rem; opacity:.35;">
              <i class="bi bi-image"></i>
            </span>
          </div>
          <small id="especiePreviewNombre"
                 style="font-size:.75rem; color:var(--ps-text-muted); font-weight:600; text-align:center;"></small>
        </div>

      </div>

    </form>
  </div>
  </div><!-- /centering wrapper -->

  <script>
    (function () {

      // ── Preview de imagen de especie al cambiar el select ──────────────────
      function actualizarEspeciePreview(select) {
        const opt  = select.options[select.selectedIndex];
        const foto = opt ? opt.getAttribute('data-foto') : '';
        const img  = document.getElementById('especiePreviewImg');
        const ph   = document.getElementById('especiePreviewPlaceholder');
        const nom  = document.getElementById('especiePreviewNombre');

        if (foto) {
          img.src = foto;
          img.style.display = 'block';
          ph.style.display  = 'none';
          nom.textContent   = opt.textContent.trim();
        } else {
          img.style.display = 'none';
          ph.style.display  = '';
          nom.textContent   = '';
        }
      }

      const selectEspecie = document.getElementById('idEspecie');
      // Cargar preview con el valor actual al abrir el formulario
      actualizarEspeciePreview(selectEspecie);
      // Actualizar al cambiar
      selectEspecie.addEventListener('change', function () {
        actualizarEspeciePreview(this);
      });

      // ── Avatar de la raza ──────────────────────────────────────────────────
      document.getElementById('fotoFile').addEventListener('change', function () {
        if (!this.files || !this.files[0]) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const avatar = document.querySelector('.raza-avatar');

          const placeholder = document.getElementById('razaAvatarPlaceholder');
          if (placeholder) placeholder.style.display = 'none';

          let img = document.getElementById('razaAvatarImg');
          if (!img) {
            img = document.createElement('img');
            img.id = 'razaAvatarImg';
            avatar.insertBefore(img, avatar.firstChild);
          }
          img.src = e.target.result;
        };
        reader.readAsDataURL(this.files[0]);
      });
    })();
  </script>

</main>
</body>
</html>
