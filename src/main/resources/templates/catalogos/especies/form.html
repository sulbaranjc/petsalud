<!doctype html>
<html th:replace="~{layout/base :: layout(${especie.id == null} ? 'Nueva Especie' : 'Editar Especie', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='cat-especies'"
      style="display:flex; flex-direction:column; min-height:calc(100vh - var(--topbar-height));">

  <style>
    .especie-avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      padding: 1.25rem 0 1.1rem;
      border-bottom: 1px solid var(--ps-border);
      margin-bottom: .5rem;
    }

    .especie-avatar-ring {
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ps-primary) 0%, #60a5fa 100%);
      box-shadow: 0 4px 18px rgba(37,99,235,.25);
      transition: transform .22s, box-shadow .22s;
      cursor: pointer;
      position: relative;
    }

    .especie-avatar-ring:hover {
      transform: scale(1.07) translateY(-3px);
      box-shadow: 0 10px 32px rgba(37,99,235,.4);
    }

    .especie-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--ps-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .especie-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .especie-avatar-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      color: var(--ps-primary);
      opacity: .65;
    }

    .especie-avatar-placeholder i    { font-size: 2.8rem; }
    .especie-avatar-placeholder span {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .especie-avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(37,99,235,.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      transition: opacity .25s ease;
      gap: .25rem;
    }

    .especie-avatar-overlay i    { font-size: 1.8rem; }
    .especie-avatar-overlay span { font-size: .68rem; font-weight: 600; letter-spacing: .04em; }

    .especie-avatar-ring:hover .especie-avatar-overlay { opacity: 1; }

    .especie-avatar-hint {
      font-size: .78rem;
      color: var(--ps-text-muted);
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    .especie-avatar-hint i    { font-size: .85rem; color: var(--ps-primary); }
    .especie-avatar-formats   { font-size: .72rem; color: var(--ps-text-light); }
  </style>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: .5rem 0 2rem;">

    <div style="width:100%; max-width:640px; text-align:center; margin-bottom:1.25rem; padding: 0 1rem;">
      <h1 class="page-title" th:text="${especie.id == null} ? 'Nueva Especie' : 'Editar Especie'"></h1>
      <p class="page-subtitle" style="margin-bottom:0;">Catálogo de especies animales atendidas</p>
    </div>

  <div class="ps-card" style="max-width: 640px; width:100%;">
    <form th:action="${especie.id == null} ? @{/catalogos/especies} : @{/catalogos/especies/{id}/editar(id=${especie.id})}"
          th:object="${especie}"
          method="post"
          enctype="multipart/form-data"
          novalidate>

      <div class="mb-1">
        <a th:href="@{/catalogos/especies}"
           style="display:inline-flex; align-items:center; gap:.35rem; font-size:.82rem;
                  font-weight:600; color:var(--ps-text-muted); text-decoration:none;
                  transition:color .2s;"
           onmouseover="this.style.color='var(--ps-primary)'"
           onmouseout="this.style.color='var(--ps-text-muted)'">
          <i class="bi bi-arrow-left"></i> Volver al listado
        </a>
      </div>

      <!-- Imagen representativa — avatar interactivo (arriba de los campos) -->
      <div class="especie-avatar-wrap">

        <div class="especie-avatar-ring" onclick="document.getElementById('fotoFile').click()" title="Cambiar imagen">
          <div class="especie-avatar">

            <!-- Imagen existente -->
            <img th:if="${especie.fotoUrl != null and !#strings.isEmpty(especie.fotoUrl)}"
                 id="especieAvatarImg"
                 th:src="${especie.fotoUrl}"
                 alt="Imagen de la especie">

            <!-- Placeholder cuando no hay imagen -->
            <div th:if="${especie.fotoUrl == null or #strings.isEmpty(especie.fotoUrl)}"
                 id="especieAvatarPlaceholder"
                 class="especie-avatar-placeholder">
              <i class="bi bi-image"></i>
              <span>Sin imagen</span>
            </div>

            <!-- Overlay de cámara al hover -->
            <div class="especie-avatar-overlay">
              <i class="bi bi-camera-fill"></i>
              <span th:text="${especie.id == null} ? 'Subir imagen' : 'Cambiar imagen'">Subir imagen</span>
            </div>
          </div>
        </div>

        <div class="especie-avatar-hint">
          <i class="bi bi-camera"></i>
          <span th:text="${especie.id == null} ? 'Haz clic en la imagen para subir una foto' : 'Haz clic en la imagen para cambiar la foto'">
            Haz clic en la imagen para subir una foto
          </span>
        </div>
        <span class="especie-avatar-formats">JPG · PNG · WEBP · máx. 5 MB</span>

        <!-- Campo file oculto — se activa al clicar el avatar -->
        <input type="file" id="fotoFile" name="fotoFile" accept="image/*" style="display:none;">

        <!-- Preserva la URL existente al enviar sin nueva imagen -->
        <input type="hidden" th:field="*{fotoUrl}">

        <div th:if="${errorFoto}" class="text-danger small" th:text="${errorFoto}"></div>
      </div>
      <!-- ── / Imagen ─────────────────────────────────────────────────────────── -->

      <!-- Nombre -->
      <div class="mb-3">
        <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input type="text"
               id="nombre"
               th:field="*{nombre}"
               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ej: Perro, Gato, Ave"
               maxlength="60">
        <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
          <span th:errors="*{nombre}"></span>
        </div>
      </div>

      <!-- Descripción -->
      <div class="mb-3">
        <label for="descripcion" class="form-label fw-semibold">Descripción</label>
        <textarea id="descripcion"
                  th:field="*{descripcion}"
                  th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                  class="form-control"
                  rows="3"
                  maxlength="255"
                  placeholder="Descripción opcional de la especie"></textarea>
        <div th:if="${#fields.hasErrors('descripcion')}" class="invalid-feedback">
          <span th:errors="*{descripcion}"></span>
        </div>
      </div>

      <!-- Activo (solo en edición) -->
      <div class="mb-4" th:if="${especie.id != null}">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
          <label class="form-check-label fw-semibold" for="activo">Activo</label>
        </div>
      </div>

      <!-- Acciones -->
      <div class="d-flex gap-2">
        <button type="submit" class="btn-ps-primary">
          <i class="bi bi-floppy-fill"></i>
          <span th:text="${especie.id == null} ? 'Guardar' : 'Actualizar'"></span>
        </button>
        <a th:href="@{/catalogos/especies}" class="btn-ps-outline">Cancelar</a>
      </div>

    </form>
  </div>
  </div><!-- /centering wrapper -->

  <script>
    (function () {
      // ── Avatar: vista previa al seleccionar archivo ──────────────────────────
      document.getElementById('fotoFile').addEventListener('change', function () {
        if (!this.files || !this.files[0]) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const avatar = document.querySelector('.especie-avatar');

          // Ocultar placeholder si existe
          const placeholder = document.getElementById('especieAvatarPlaceholder');
          if (placeholder) placeholder.style.display = 'none';

          // Actualizar o crear el <img> del avatar
          let img = document.getElementById('especieAvatarImg');
          if (!img) {
            img = document.createElement('img');
            img.id = 'especieAvatarImg';
            avatar.insertBefore(img, avatar.firstChild);
          }
          img.src = e.target.result;
        };
        reader.readAsDataURL(this.files[0]);
      });
    })();
  </script>

</main>
</body>
</html>
