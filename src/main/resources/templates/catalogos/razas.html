<!doctype html>
<html th:replace="~{layout/base :: layout('Razas', ~{::main})}" lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='cat-razas'">

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title">Razas</h1>
      <p class="page-subtitle">Catálogo de razas por especie</p>
    </div>
    <button class="btn-ps-primary"><i class="bi bi-plus-lg"></i> Nueva Raza</button>
  </div>

  <div class="ps-card filter-bar">
    <div class="row g-2 align-items-center">
      <div class="col-md-4">
        <div class="filter-search-wrap">
          <i class="bi bi-search"></i>
          <input type="text" class="filter-input" placeholder="Buscar raza...">
        </div>
      </div>
      <div class="col-md-3">
        <select class="filter-select">
          <option value="">Todas las especies</option>
          <option>Perro</option>
          <option>Gato</option>
          <option>Ave</option>
          <option>Conejo</option>
        </select>
      </div>
      <div class="col-md-2">
        <select class="filter-select">
          <option value="">Estado</option>
          <option>Activo</option>
          <option>Inactivo</option>
        </select>
      </div>
      <div class="col-md-2 text-end ms-auto">
        <button class="btn-ps-outline w-100"><i class="bi bi-funnel"></i> Filtrar</button>
      </div>
    </div>
  </div>

  <div class="ps-card">
    <table class="ps-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Especie</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>Labrador Retriever</strong></td>
          <td><span class="ps-badge badge-info">Perro</span></td>
          <td><span class="ps-badge badge-success">Activo</span></td>
          <td><div class="table-actions">
            <button class="action-btn action-btn-edit" title="Editar"><i class="bi bi-pencil-fill"></i></button>
            <button class="action-btn action-btn-danger" title="Desactivar"><i class="bi bi-toggle-on"></i></button>
          </div></td>
        </tr>
        <tr>
          <td><strong>Golden Retriever</strong></td>
          <td><span class="ps-badge badge-info">Perro</span></td>
          <td><span class="ps-badge badge-success">Activo</span></td>
          <td><div class="table-actions">
            <button class="action-btn action-btn-edit" title="Editar"><i class="bi bi-pencil-fill"></i></button>
            <button class="action-btn action-btn-danger" title="Desactivar"><i class="bi bi-toggle-on"></i></button>
          </div></td>
        </tr>
        <tr>
          <td><strong>Siamés</strong></td>
          <td><span class="ps-badge badge-purple">Gato</span></td>
          <td><span class="ps-badge badge-success">Activo</span></td>
          <td><div class="table-actions">
            <button class="action-btn action-btn-edit" title="Editar"><i class="bi bi-pencil-fill"></i></button>
            <button class="action-btn action-btn-danger" title="Desactivar"><i class="bi bi-toggle-on"></i></button>
          </div></td>
        </tr>
        <tr>
          <td><strong>Persa</strong></td>
          <td><span class="ps-badge badge-purple">Gato</span></td>
          <td><span class="ps-badge badge-success">Activo</span></td>
          <td><div class="table-actions">
            <button class="action-btn action-btn-edit" title="Editar"><i class="bi bi-pencil-fill"></i></button>
            <button class="action-btn action-btn-danger" title="Desactivar"><i class="bi bi-toggle-on"></i></button>
          </div></td>
        </tr>
        <tr>
          <td><strong>Canario</strong></td>
          <td><span class="ps-badge badge-warning">Ave</span></td>
          <td><span class="ps-badge badge-success">Activo</span></td>
          <td><div class="table-actions">
            <button class="action-btn action-btn-edit" title="Editar"><i class="bi bi-pencil-fill"></i></button>
            <button class="action-btn action-btn-danger" title="Desactivar"><i class="bi bi-toggle-on"></i></button>
          </div></td>
        </tr>
      </tbody>
    </table>
    <div class="ps-pagination">
      <span class="pagination-info">Mostrando 1–5 de 108 registros</span>
      <div class="pagination-controls">
        <button class="page-btn" disabled><i class="bi bi-chevron-left"></i></button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <span class="page-ellipsis">…</span>
        <button class="page-btn">22</button>
        <button class="page-btn"><i class="bi bi-chevron-right"></i></button>
      </div>
    </div>
  </div>

</main>
</body>
</html>
