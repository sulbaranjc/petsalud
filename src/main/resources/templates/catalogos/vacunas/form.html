<!doctype html>
<html th:replace="~{layout/base :: layout(${vacuna.id == null} ? 'Nueva Vacuna' : 'Editar Vacuna', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='cat-vacunas'">

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title"
          th:text="${vacuna.id == null} ? 'Nueva Vacuna' : 'Editar Vacuna'"></h1>
      <p class="page-subtitle">Catálogo de vacunas disponibles para aplicación</p>
    </div>
    <a th:href="@{/catalogos/vacunas}" class="btn-ps-outline">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>

  <div class="ps-card" style="max-width: 640px;">
    <form th:action="${vacuna.id == null}
                      ? @{/catalogos/vacunas}
                      : @{/catalogos/vacunas/{id}/editar(id=${vacuna.id})}"
          th:object="${vacuna}"
          method="post"
          novalidate>

      <!-- Nombre -->
      <div class="mb-3">
        <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input type="text"
               id="nombre"
               th:field="*{nombre}"
               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ej: Rabia, Parvovirus, Leptospirosis"
               maxlength="150">
        <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
          <span th:errors="*{nombre}"></span>
        </div>
      </div>

      <!-- Laboratorio -->
      <div class="mb-3">
        <label for="laboratorio" class="form-label fw-semibold">Laboratorio</label>
        <input type="text"
               id="laboratorio"
               th:field="*{laboratorio}"
               th:classappend="${#fields.hasErrors('laboratorio')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ej: Pfizer, MSD Salud Animal, Boehringer Ingelheim"
               maxlength="100">
        <div th:if="${#fields.hasErrors('laboratorio')}" class="invalid-feedback">
          <span th:errors="*{laboratorio}"></span>
        </div>
      </div>

      <!-- Descripción -->
      <div class="mb-3">
        <label for="descripcion" class="form-label fw-semibold">Descripción</label>
        <textarea id="descripcion"
                  th:field="*{descripcion}"
                  th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                  class="form-control"
                  rows="3"
                  maxlength="255"
                  placeholder="Indicaciones, dosis, esquema de aplicación u observaciones"></textarea>
        <div th:if="${#fields.hasErrors('descripcion')}" class="invalid-feedback">
          <span th:errors="*{descripcion}"></span>
        </div>
      </div>

      <!-- Activo (solo en edición) -->
      <div class="mb-4" th:if="${vacuna.id != null}">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
          <label class="form-check-label fw-semibold" for="activo">Activo</label>
        </div>
      </div>

      <!-- Acciones -->
      <div class="d-flex gap-2">
        <button type="submit" class="btn-ps-primary">
          <i class="bi bi-floppy-fill"></i>
          <span th:text="${vacuna.id == null} ? 'Guardar' : 'Actualizar'"></span>
        </button>
        <a th:href="@{/catalogos/vacunas}" class="btn-ps-outline">Cancelar</a>
      </div>

    </form>
  </div>

</main>
</body>
</html>
