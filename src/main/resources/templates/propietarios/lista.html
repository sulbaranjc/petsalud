<!doctype html>
<html th:replace="~{layout/base :: layout('Propietarios', ~{::main})}" lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='propietarios'">

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title">Propietarios</h1>
      <p class="page-subtitle">Tutores y dueños de mascotas registrados</p>
    </div>
    <a th:href="@{/propietarios/nuevo}" class="btn-ps-primary">
      <i class="bi bi-plus-lg"></i> Nuevo Propietario
    </a>
  </div>

  <!-- Mensaje flash -->
  <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${mensajeExito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Filtros -->
  <form th:action="@{/propietarios}" method="get">
    <div class="ps-card filter-bar">
      <div class="row g-2 align-items-center">
        <div class="col-md-6">
          <div class="filter-search-wrap">
            <i class="bi bi-search"></i>
            <input type="text" name="q" class="filter-input"
                   placeholder="Buscar por nombre, documento, email..."
                   th:value="${q}">
          </div>
        </div>
        <div class="col-md-2">
          <select name="activo" class="filter-select">
            <option value="">Estado</option>
            <option value="1" th:selected="${activoFiltro == '1'}">Activo</option>
            <option value="0" th:selected="${activoFiltro == '0'}">Inactivo</option>
          </select>
        </div>
        <div class="col-md-4 d-flex gap-2 justify-content-end">
          <button type="submit" class="btn-ps-outline"><i class="bi bi-funnel"></i> Filtrar</button>
          <a th:href="@{/propietarios}" class="btn-ps-outline"><i class="bi bi-x-lg"></i> Limpiar</a>
        </div>
      </div>
    </div>
  </form>

  <!-- Tabla -->
  <div class="ps-card">
    <table class="ps-table">
      <thead>
        <tr>
          <th>Nombre completo</th>
          <th>Documento</th>
          <th>Teléfono</th>
          <th>Email</th>
          <th>Mascotas</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${propietarios}">
          <td><strong th:text="${p.nombreCompleto}"></strong></td>
          <td th:text="${p.documento}"></td>
          <td th:text="${p.telefono ?: '—'}"></td>
          <td th:text="${p.email ?: '—'}"></td>
          <td>
            <a th:href="@{/mascotas(idPropietario=${p.id})}"
               class="ps-badge badge-primary text-decoration-none"
               th:text="${p.totalMascotas}"
               title="Ver mascotas">
            </a>
          </td>
          <td>
            <span th:if="${p.activo}"    class="ps-badge badge-success">Activo</span>
            <span th:unless="${p.activo}" class="ps-badge badge-neutral">Inactivo</span>
          </td>
          <td>
            <div class="table-actions">
              <a th:href="@{/propietarios/{id}/editar(id=${p.id})}"
                 class="action-btn action-btn-edit" title="Editar">
                <i class="bi bi-pencil-fill"></i>
              </a>
              <form th:action="@{/propietarios/{id}/toggle(id=${p.id})}"
                    method="post" style="display:inline;">
                <button type="submit"
                        th:class="${p.activo} ? 'action-btn action-btn-danger' : 'action-btn action-btn-success'"
                        th:title="${p.activo} ? 'Desactivar' : 'Activar'">
                  <i th:class="${p.activo} ? 'bi bi-toggle-on' : 'bi bi-toggle-off'"></i>
                </button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(propietarios)}">
          <td colspan="7" class="text-center text-muted py-4">No hay propietarios registrados.</td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
</body>
</html>
