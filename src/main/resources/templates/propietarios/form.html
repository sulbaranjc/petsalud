<!doctype html>
<html th:replace="~{layout/base :: layout(${propietario.id == null} ? 'Nuevo Propietario' : 'Editar Propietario', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='propietarios'"
      style="display:flex; flex-direction:column; min-height:calc(100vh - var(--topbar-height));">

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: .5rem 0 2rem;">

    <div style="width:100%; max-width:760px; text-align:center; margin-bottom:1.25rem; padding: 0 1rem;">
      <h1 class="page-title" th:text="${propietario.id == null} ? 'Nuevo Propietario' : 'Editar Propietario'"></h1>
      <p class="page-subtitle" style="margin-bottom:0;">Tutores y dueños de mascotas registrados</p>
    </div>

  <div class="ps-card" style="max-width: 760px; width:100%;">
    <form th:action="${propietario.id == null} ? @{/propietarios} : @{/propietarios/{id}/editar(id=${propietario.id})}"
          th:object="${propietario}"
          method="post"
          novalidate>

      <div class="mb-1">
        <a th:href="@{/propietarios}"
           style="display:inline-flex; align-items:center; gap:.35rem; font-size:.82rem;
                  font-weight:600; color:var(--ps-text-muted); text-decoration:none;
                  transition:color .2s;"
           onmouseover="this.style.color='var(--ps-primary)'"
           onmouseout="this.style.color='var(--ps-text-muted)'">
          <i class="bi bi-arrow-left"></i> Volver al listado
        </a>
      </div>

      <div class="row g-3">

        <!-- Nombre -->
        <div class="col-md-6">
          <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text"
                 id="nombre"
                 th:field="*{nombre}"
                 th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Nombre(s)"
                 maxlength="100">
          <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
            <span th:errors="*{nombre}"></span>
          </div>
        </div>

        <!-- Apellido -->
        <div class="col-md-6">
          <label for="apellido" class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
          <input type="text"
                 id="apellido"
                 th:field="*{apellido}"
                 th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Apellido(s)"
                 maxlength="100">
          <div th:if="${#fields.hasErrors('apellido')}" class="invalid-feedback">
            <span th:errors="*{apellido}"></span>
          </div>
        </div>

        <!-- Documento -->
        <div class="col-md-4">
          <label for="documento" class="form-label fw-semibold">Documento <span class="text-danger">*</span></label>
          <input type="text"
                 id="documento"
                 th:field="*{documento}"
                 th:classappend="${#fields.hasErrors('documento')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="DNI, cédula, pasaporte"
                 maxlength="20">
          <div th:if="${#fields.hasErrors('documento')}" class="invalid-feedback">
            <span th:errors="*{documento}"></span>
          </div>
        </div>

        <!-- Teléfono -->
        <div class="col-md-4">
          <label for="telefono" class="form-label fw-semibold">Teléfono</label>
          <input type="tel"
                 id="telefono"
                 th:field="*{telefono}"
                 class="form-control"
                 placeholder="+51 999 999 999"
                 maxlength="20">
        </div>

        <!-- Email -->
        <div class="col-md-4">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input type="email"
                 id="email"
                 th:field="*{email}"
                 class="form-control"
                 placeholder="correo@ejemplo.com"
                 maxlength="150">
        </div>

        <!-- Dirección -->
        <div class="col-12">
          <label for="direccion" class="form-label fw-semibold">Dirección</label>
          <input type="text"
                 id="direccion"
                 th:field="*{direccion}"
                 class="form-control"
                 placeholder="Dirección de residencia"
                 maxlength="255">
        </div>

        <!-- Activo (solo en edición) -->
        <div class="col-12" th:if="${propietario.id != null}">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
            <label class="form-check-label fw-semibold" for="activo">Activo</label>
          </div>
        </div>

      </div><!-- /row -->

      <!-- Acciones -->
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn-ps-primary">
          <i class="bi bi-floppy-fill"></i>
          <span th:text="${propietario.id == null} ? 'Guardar' : 'Actualizar'"></span>
        </button>
        <a th:href="@{/propietarios}" class="btn-ps-outline">Cancelar</a>
      </div>

    </form>
  </div>
  </div><!-- /centering wrapper -->

</main>
</body>
</html>
