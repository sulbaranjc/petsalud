<!doctype html>
<html th:replace="~{layout/base :: layout(${veterinario.id == null} ? 'Nuevo Veterinario' : 'Editar Veterinario', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='veterinarios'">

  <style>
    /* ── Avatar de foto de veterinario ───────────────────────────────────────── */
    .mascota-avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid var(--ps-border);
      margin-bottom: .5rem;
    }

    .mascota-avatar-ring {
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ps-primary) 0%, #60a5fa 100%);
      box-shadow: 0 4px 18px rgba(37, 99, 235, .25);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
      cursor: pointer;
      position: relative;
    }

    .mascota-avatar-ring:hover {
      transform: scale(1.07) translateY(-3px);
      box-shadow: 0 10px 32px rgba(37, 99, 235, .4);
    }

    .mascota-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--ps-primary-light);
      border: 4px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mascota-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mascota-avatar-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      color: var(--ps-primary);
      opacity: .65;
    }

    .mascota-avatar-placeholder i     { font-size: 2.8rem; }

    .mascota-avatar-placeholder span {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .mascota-avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(37, 99, 235, .55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      transition: opacity .25s ease;
      gap: .25rem;
    }

    .mascota-avatar-overlay i    { font-size: 1.8rem; }
    .mascota-avatar-overlay span { font-size: .68rem; font-weight: 600; letter-spacing: .04em; }

    .mascota-avatar-ring:hover .mascota-avatar-overlay { opacity: 1; }

    .mascota-avatar-hint {
      font-size: .78rem;
      color: var(--ps-text-muted);
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    .mascota-avatar-hint i    { font-size: .85rem; color: var(--ps-primary); }
    .mascota-avatar-formats   { font-size: .72rem; color: var(--ps-text-light); }
  </style>

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title"
          th:text="${veterinario.id == null} ? 'Nuevo Veterinario' : 'Editar Veterinario'"></h1>
      <p class="page-subtitle">Personal médico de la clínica</p>
    </div>
    <a th:href="@{/veterinarios}" class="btn-ps-outline">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>

  <div class="ps-card" style="max-width: 760px;">
    <form th:action="${veterinario.id == null}
                      ? @{/veterinarios}
                      : @{/veterinarios/{id}/editar(id=${veterinario.id})}"
          th:object="${veterinario}"
          method="post"
          enctype="multipart/form-data"
          novalidate>

      <!-- ── Foto protagonista ──────────────────────────────────────────────── -->
      <div class="mascota-avatar-wrap">

        <div class="mascota-avatar-ring" onclick="document.getElementById('fotoFile').click()" title="Cambiar foto">
          <div class="mascota-avatar">

            <!-- Foto existente -->
            <img th:if="${veterinario.fotoUrl != null and !#strings.isEmpty(veterinario.fotoUrl)}"
                 id="fotoAvatarImg"
                 th:src="${veterinario.fotoUrl}"
                 alt="Foto del veterinario">

            <!-- Placeholder cuando no hay foto -->
            <div th:if="${veterinario.fotoUrl == null or #strings.isEmpty(veterinario.fotoUrl)}"
                 id="fotoAvatarPlaceholder"
                 class="mascota-avatar-placeholder">
              <i class="bi bi-person-fill"></i>
              <span>Sin foto</span>
            </div>

            <!-- Overlay de cámara al hover -->
            <div class="mascota-avatar-overlay">
              <i class="bi bi-camera-fill"></i>
              <span th:text="${veterinario.id == null} ? 'Subir foto' : 'Cambiar foto'">Subir foto</span>
            </div>
          </div>
        </div>

        <div class="mascota-avatar-hint">
          <i class="bi bi-camera"></i>
          <span th:text="${veterinario.id == null}
                          ? 'Haz clic en la imagen para subir una foto'
                          : 'Haz clic en la imagen para cambiar la foto'">
            Haz clic en la imagen para subir una foto
          </span>
        </div>
        <span class="mascota-avatar-formats">JPG · PNG · WEBP · máx. 5 MB</span>

        <input type="file" id="fotoFile" name="fotoFile" accept="image/*" style="display:none;">
        <input type="hidden" th:field="*{fotoUrl}">

        <div th:if="${errorFoto}" class="text-danger small" th:text="${errorFoto}"></div>
      </div>
      <!-- ── / Foto ──────────────────────────────────────────────────────────── -->

      <div class="row g-3 mt-1">

        <!-- Nombre -->
        <div class="col-md-6">
          <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text"
                 id="nombre"
                 th:field="*{nombre}"
                 th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Nombre(s)"
                 maxlength="100">
          <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
            <span th:errors="*{nombre}"></span>
          </div>
        </div>

        <!-- Apellido -->
        <div class="col-md-6">
          <label for="apellido" class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
          <input type="text"
                 id="apellido"
                 th:field="*{apellido}"
                 th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Apellido(s)"
                 maxlength="100">
          <div th:if="${#fields.hasErrors('apellido')}" class="invalid-feedback">
            <span th:errors="*{apellido}"></span>
          </div>
        </div>

        <!-- Matrícula -->
        <div class="col-md-4">
          <label for="matricula" class="form-label fw-semibold">Matrícula <span class="text-danger">*</span></label>
          <input type="text"
                 id="matricula"
                 th:field="*{matricula}"
                 th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Ej: VET-00123"
                 maxlength="50">
          <div th:if="${#fields.hasErrors('matricula')}" class="invalid-feedback">
            <span th:errors="*{matricula}"></span>
          </div>
        </div>

        <!-- Teléfono -->
        <div class="col-md-4">
          <label for="telefono" class="form-label fw-semibold">Teléfono</label>
          <input type="tel"
                 id="telefono"
                 th:field="*{telefono}"
                 class="form-control"
                 placeholder="+51 999 999 999"
                 maxlength="20">
        </div>

        <!-- Email -->
        <div class="col-md-4">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input type="email"
                 id="email"
                 th:field="*{email}"
                 class="form-control"
                 placeholder="correo@clinica.com"
                 maxlength="150">
        </div>

        <!-- Especialidad -->
        <div class="col-md-6">
          <label for="idEspecialidad" class="form-label fw-semibold">Especialidad</label>
          <select id="idEspecialidad"
                  th:field="*{idEspecialidad}"
                  class="form-select">
            <option value="">Sin especialidad / Medicina general</option>
            <option th:each="esp : ${especialidades}"
                    th:value="${esp.id}"
                    th:text="${esp.nombre}">
            </option>
          </select>
          <div class="form-text text-muted">
            Dejar vacío si el veterinario atiende medicina general.
          </div>
        </div>

        <!-- Activo (solo en edición) -->
        <div class="col-12" th:if="${veterinario.id != null}">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
            <label class="form-check-label fw-semibold" for="activo">Activo</label>
          </div>
        </div>

      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn-ps-primary">
          <i class="bi bi-floppy-fill"></i>
          <span th:text="${veterinario.id == null} ? 'Guardar' : 'Actualizar'"></span>
        </button>
        <a th:href="@{/veterinarios}" class="btn-ps-outline">Cancelar</a>
      </div>

    </form>
  </div>

  <script>
    document.getElementById('fotoFile').addEventListener('change', function () {
      if (!this.files || !this.files[0]) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        const avatar = document.querySelector('.mascota-avatar');

        const placeholder = document.getElementById('fotoAvatarPlaceholder');
        if (placeholder) placeholder.style.display = 'none';

        let img = document.getElementById('fotoAvatarImg');
        if (!img) {
          img = document.createElement('img');
          img.id = 'fotoAvatarImg';
          avatar.insertBefore(img, avatar.firstChild);
        }
        img.src = e.target.result;
      };
      reader.readAsDataURL(this.files[0]);
    });
  </script>

</main>
</body>
</html>
