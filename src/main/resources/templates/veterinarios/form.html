<!doctype html>
<html th:replace="~{layout/base :: layout(${veterinario.id == null} ? 'Nuevo Veterinario' : 'Editar Veterinario', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='veterinarios'">

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title"
          th:text="${veterinario.id == null} ? 'Nuevo Veterinario' : 'Editar Veterinario'"></h1>
      <p class="page-subtitle">Personal médico de la clínica</p>
    </div>
    <a th:href="@{/veterinarios}" class="btn-ps-outline">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>

  <div class="ps-card" style="max-width: 760px;">
    <form th:action="${veterinario.id == null}
                      ? @{/veterinarios}
                      : @{/veterinarios/{id}/editar(id=${veterinario.id})}"
          th:object="${veterinario}"
          method="post"
          enctype="multipart/form-data"
          novalidate>

      <div class="row g-3">

        <!-- Nombre -->
        <div class="col-md-6">
          <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text"
                 id="nombre"
                 th:field="*{nombre}"
                 th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Nombre(s)"
                 maxlength="100">
          <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
            <span th:errors="*{nombre}"></span>
          </div>
        </div>

        <!-- Apellido -->
        <div class="col-md-6">
          <label for="apellido" class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
          <input type="text"
                 id="apellido"
                 th:field="*{apellido}"
                 th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Apellido(s)"
                 maxlength="100">
          <div th:if="${#fields.hasErrors('apellido')}" class="invalid-feedback">
            <span th:errors="*{apellido}"></span>
          </div>
        </div>

        <!-- Matrícula -->
        <div class="col-md-4">
          <label for="matricula" class="form-label fw-semibold">Matrícula <span class="text-danger">*</span></label>
          <input type="text"
                 id="matricula"
                 th:field="*{matricula}"
                 th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Ej: VET-00123"
                 maxlength="50">
          <div th:if="${#fields.hasErrors('matricula')}" class="invalid-feedback">
            <span th:errors="*{matricula}"></span>
          </div>
        </div>

        <!-- Teléfono -->
        <div class="col-md-4">
          <label for="telefono" class="form-label fw-semibold">Teléfono</label>
          <input type="tel"
                 id="telefono"
                 th:field="*{telefono}"
                 class="form-control"
                 placeholder="+51 999 999 999"
                 maxlength="20">
        </div>

        <!-- Email -->
        <div class="col-md-4">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input type="email"
                 id="email"
                 th:field="*{email}"
                 class="form-control"
                 placeholder="correo@clinica.com"
                 maxlength="150">
        </div>

        <!-- Especialidad -->
        <div class="col-md-6">
          <label for="idEspecialidad" class="form-label fw-semibold">Especialidad</label>
          <select id="idEspecialidad"
                  th:field="*{idEspecialidad}"
                  class="form-select">
            <option value="">Sin especialidad / Medicina general</option>
            <option th:each="esp : ${especialidades}"
                    th:value="${esp.id}"
                    th:text="${esp.nombre}">
            </option>
          </select>
          <div class="form-text text-muted">
            Dejar vacío si el veterinario atiende medicina general.
          </div>
        </div>

        <!-- Foto -->
        <div class="col-12">
          <label class="form-label fw-semibold">Foto <small class="text-muted">(opcional · JPG, PNG, WEBP · máx. 5 MB)</small></label>

          <!-- Foto actual (solo en edición) -->
          <div th:if="${veterinario.fotoUrl != null and !#strings.isEmpty(veterinario.fotoUrl)}" class="mb-2">
            <img th:src="${veterinario.fotoUrl}" alt="Foto actual"
                 style="height:100px;width:100px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6;">
            <small class="d-block text-muted mt-1">Foto actual</small>
          </div>

          <!-- Guarda la URL existente al hacer submit sin subir nueva foto -->
          <input type="hidden" th:field="*{fotoUrl}">

          <input type="file"
                 id="fotoFile"
                 name="fotoFile"
                 class="form-control"
                 accept="image/*">

          <!-- Vista previa antes de guardar -->
          <div id="fotoPreview" class="mt-2" style="display:none;">
            <img id="fotoPreviewImg" src="" alt="Vista previa"
                 style="height:100px;width:100px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6;">
            <small class="d-block text-muted mt-1">Vista previa</small>
          </div>

          <div th:if="${errorFoto}" class="text-danger small mt-1" th:text="${errorFoto}"></div>
        </div>

        <!-- Activo (solo en edición) -->
        <div class="col-12" th:if="${veterinario.id != null}">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
            <label class="form-check-label fw-semibold" for="activo">Activo</label>
          </div>
        </div>

      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn-ps-primary">
          <i class="bi bi-floppy-fill"></i>
          <span th:text="${veterinario.id == null} ? 'Guardar' : 'Actualizar'"></span>
        </button>
        <a th:href="@{/veterinarios}" class="btn-ps-outline">Cancelar</a>
      </div>

    </form>
  </div>

  <script>
    document.getElementById('fotoFile').addEventListener('change', function () {
      const preview = document.getElementById('fotoPreview');
      const img     = document.getElementById('fotoPreviewImg');
      if (this.files && this.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) { img.src = e.target.result; preview.style.display = 'block'; };
        reader.readAsDataURL(this.files[0]);
      } else {
        preview.style.display = 'none';
      }
    });
  </script>

</main>
</body>
</html>
