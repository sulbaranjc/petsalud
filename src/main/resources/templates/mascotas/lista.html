<!doctype html>
<html th:replace="~{layout/base :: layout('Mascotas', ~{::main})}" lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='mascotas'">

  <style>
    /* ── Avatar de mascota en tabla ───────────────────────────────────────────── */
    .mascota-list-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--ps-border);
      flex-shrink: 0;
      transition: border-color .2s, transform .2s;
    }

    .mascota-list-avatar-placeholder {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--ps-primary-light);
      border: 2px solid var(--ps-border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ps-primary);
      font-size: .95rem;
      opacity: .8;
      transition: border-color .2s, transform .2s;
    }

    .ps-table tbody tr:hover .mascota-list-avatar,
    .ps-table tbody tr:hover .mascota-list-avatar-placeholder {
      border-color: var(--ps-primary);
      transform: scale(1.08);
    }

    .mascota-nombre-cell {
      display: flex;
      align-items: center;
      gap: .65rem;
    }
  </style>

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title">Mascotas</h1>
      <p class="page-subtitle">Pacientes registrados en la clínica</p>
    </div>
    <a th:href="@{/mascotas/nueva}" class="btn-ps-primary">
      <i class="bi bi-plus-lg"></i> Nueva Mascota
    </a>
  </div>

  <!-- Mensaje flash -->
  <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${mensajeExito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Filtros -->
  <form th:action="@{/mascotas}" method="get">
    <!-- Preservar idPropietario si viene como filtro externo -->
    <input th:if="${idPropietarioFiltro}" type="hidden" name="idPropietario" th:value="${idPropietarioFiltro}">
    <div class="ps-card filter-bar">
      <div class="row g-2 align-items-center">
        <div class="col-md-4">
          <div class="filter-search-wrap">
            <i class="bi bi-search"></i>
            <input type="text" name="q" class="filter-input"
                   placeholder="Buscar por nombre, especie, raza, propietario..."
                   th:value="${q}">
          </div>
        </div>
        <div class="col-md-2">
          <select name="idEspecie" class="filter-select">
            <option value="">Todas las especies</option>
            <option th:each="especie : ${especies}"
                    th:value="${especie.id}"
                    th:text="${especie.nombre}"
                    th:selected="${especie.id == idEspecieFiltro}">
            </option>
          </select>
        </div>
        <div class="col-md-2">
          <select name="sexo" class="filter-select">
            <option value="">Todos los sexos</option>
            <option value="M"           th:selected="${sexoFiltro == 'M'}">Macho</option>
            <option value="F"           th:selected="${sexoFiltro == 'F'}">Hembra</option>
            <option value="Desconocido" th:selected="${sexoFiltro == 'Desconocido'}">Desconocido</option>
          </select>
        </div>
        <div class="col-md-2">
          <select name="activo" class="filter-select">
            <option value="">Estado</option>
            <option value="1" th:selected="${activoFiltro == '1'}">Activo</option>
            <option value="0" th:selected="${activoFiltro == '0'}">Inactivo</option>
          </select>
        </div>
        <div class="col-md-2 d-flex gap-2 justify-content-end">
          <button type="submit" class="btn-ps-outline"><i class="bi bi-funnel"></i> Filtrar</button>
          <a th:href="@{/mascotas}" class="btn-ps-outline"><i class="bi bi-x-lg"></i> Limpiar</a>
        </div>
      </div>
    </div>
  </form>

  <!-- Tabla -->
  <div class="ps-card">
    <table class="ps-table">
      <thead>
        <tr>
          <th th:with="col='nombre', nextDir=${sortBy == 'nombre' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc'}">
            <a th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro}, activo=${activoFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Nombre
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th th:with="col='especie', nextDir=${sortBy == 'especie' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc'}">
            <a th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro}, activo=${activoFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Especie / Raza
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th th:with="col='sexo', nextDir=${sortBy == 'sexo' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc'}">
            <a th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro}, activo=${activoFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Sexo
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th th:with="col='propietario', nextDir=${sortBy == 'propietario' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc'}">
            <a th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro}, activo=${activoFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Propietario
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th th:with="col='nacimiento', nextDir=${sortBy == 'nacimiento' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc'}">
            <a th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro}, activo=${activoFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Nacimiento
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="mascota : ${mascotas}">
          <td>
            <div class="mascota-nombre-cell">
              <!-- Avatar con foto -->
              <img th:if="${mascota.fotoUrl != null and !#strings.isEmpty(mascota.fotoUrl)}"
                   th:src="${mascota.fotoUrl}"
                   th:alt="${mascota.nombre}"
                   class="mascota-list-avatar">
              <!-- Placeholder pata cuando no hay foto -->
              <div th:if="${mascota.fotoUrl == null or #strings.isEmpty(mascota.fotoUrl)}"
                   class="mascota-list-avatar-placeholder"
                   th:title="${mascota.nombre}">
                <i class="bi bi-paw-fill"></i>
              </div>
              <strong th:text="${mascota.nombre}"></strong>
            </div>
          </td>
          <td>
            <span th:text="${mascota.nombreEspecie}"></span>
            <small class="text-muted d-block"
                   th:text="${mascota.nombreRaza ?: 'Sin raza / Mestizo'}"></small>
          </td>
          <td>
            <span th:switch="${mascota.sexo}">
              <span th:case="'M'">Macho</span>
              <span th:case="'F'">Hembra</span>
              <span th:case="*">Desconocido</span>
            </span>
          </td>
          <td th:text="${mascota.nombrePropietario}"></td>
          <td th:text="${mascota.fechaNacimiento != null}
                        ? ${#temporals.format(mascota.fechaNacimiento, 'dd/MM/yyyy')}
                        : '—'"></td>
          <td>
            <span th:if="${mascota.activo}"    class="ps-badge badge-success">Activo</span>
            <span th:unless="${mascota.activo}" class="ps-badge badge-neutral">Inactivo</span>
          </td>
          <td>
            <div class="table-actions">
              <a th:href="@{/mascotas/{id}/editar(id=${mascota.id})}"
                 class="action-btn action-btn-edit" title="Editar">
                <i class="bi bi-pencil-fill"></i>
              </a>
              <form th:action="@{/mascotas/{id}/toggle(id=${mascota.id})}"
                    method="post" style="display:inline;">
                <button type="submit"
                        th:class="${mascota.activo} ? 'action-btn action-btn-danger' : 'action-btn action-btn-success'"
                        th:title="${mascota.activo} ? 'Desactivar' : 'Activar'">
                  <i th:class="${mascota.activo} ? 'bi bi-toggle-on' : 'bi bi-toggle-off'"></i>
                </button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(mascotas)}">
          <td colspan="7" class="text-center text-muted py-4">No hay mascotas registradas.</td>
        </tr>
      </tbody>
    </table>

    <!-- Paginación -->
    <div class="ps-pagination">
      <span class="pagination-info"
            th:text="'Mostrando ' + ${pagina.from} + '–' + ${pagina.to}
                     + ' de ' + ${pagina.totalElements} + ' registros'">
      </span>
      <div class="pagination-controls">

        <!-- Botón anterior -->
        <a th:if="${pagina.hasPrevious()}"
           th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro},
                               activo=${activoFiltro}, sortBy=${sortBy}, sortDir=${sortDir},
                               page=${pagina.pageNumber - 1})}"
           class="page-btn">
          <i class="bi bi-chevron-left"></i>
        </a>
        <span th:unless="${pagina.hasPrevious()}" class="page-btn disabled">
          <i class="bi bi-chevron-left"></i>
        </span>

        <!-- Números de página con elipsis -->
        <th:block th:each="p : ${ventanaPaginas}">
          <span th:if="${p == -1}" class="page-ellipsis">…</span>
          <a th:unless="${p == -1}"
             th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro},
                                 activo=${activoFiltro}, sortBy=${sortBy}, sortDir=${sortDir},
                                 page=${p})}"
             th:class="${p == pagina.pageNumber} ? 'page-btn active' : 'page-btn'"
             th:text="${p}">
          </a>
        </th:block>

        <!-- Botón siguiente -->
        <a th:if="${pagina.hasNext()}"
           th:href="@{/mascotas(q=${q}, idEspecie=${idEspecieFiltro}, idPropietario=${idPropietarioFiltro}, sexo=${sexoFiltro},
                               activo=${activoFiltro}, sortBy=${sortBy}, sortDir=${sortDir},
                               page=${pagina.pageNumber + 1})}"
           class="page-btn">
          <i class="bi bi-chevron-right"></i>
        </a>
        <span th:unless="${pagina.hasNext()}" class="page-btn disabled">
          <i class="bi bi-chevron-right"></i>
        </span>

      </div>
    </div>
  </div>

</main>
</body>
</html>
