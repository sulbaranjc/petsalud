<!doctype html>
<html th:replace="~{layout/base :: layout(${mascota.id == null} ? 'Nueva Mascota' : 'Editar Mascota', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='mascotas'">

  <style>
    /* ── Avatar de foto de mascota ────────────────────────────────────────────── */
    .mascota-avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid var(--ps-border);
      margin-bottom: .5rem;
    }

    .mascota-avatar-ring {
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ps-primary) 0%, #60a5fa 100%);
      box-shadow: 0 4px 18px rgba(37, 99, 235, .25);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
      cursor: pointer;
      position: relative;
    }

    .mascota-avatar-ring:hover {
      transform: scale(1.07) translateY(-3px);
      box-shadow: 0 10px 32px rgba(37, 99, 235, .4);
    }

    .mascota-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--ps-primary-light);
      border: 4px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mascota-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mascota-avatar-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      color: var(--ps-primary);
      opacity: .65;
    }

    .mascota-avatar-placeholder i {
      font-size: 2.8rem;
    }

    .mascota-avatar-placeholder span {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* Overlay al hacer hover: ícono de cámara */
    .mascota-avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(37, 99, 235, .55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      transition: opacity .25s ease;
      gap: .25rem;
    }

    .mascota-avatar-overlay i {
      font-size: 1.8rem;
    }

    .mascota-avatar-overlay span {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .04em;
    }

    .mascota-avatar-ring:hover .mascota-avatar-overlay {
      opacity: 1;
    }

    .mascota-avatar-hint {
      font-size: .78rem;
      color: var(--ps-text-muted);
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    .mascota-avatar-hint i {
      font-size: .85rem;
      color: var(--ps-primary);
    }

    .mascota-avatar-formats {
      font-size: .72rem;
      color: var(--ps-text-light);
    }
  </style>

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title" th:text="${mascota.id == null} ? 'Nueva Mascota' : 'Editar Mascota'"></h1>
      <p class="page-subtitle">Pacientes registrados en la clínica</p>
    </div>
    <a th:href="@{/mascotas}" class="btn-ps-outline">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>

  <div class="ps-card" style="max-width: 760px;">
    <form th:action="${mascota.id == null} ? @{/mascotas} : @{/mascotas/{id}/editar(id=${mascota.id})}"
          th:object="${mascota}"
          method="post"
          enctype="multipart/form-data"
          novalidate>

      <!-- ── Foto protagonista ──────────────────────────────────────────────── -->
      <div class="mascota-avatar-wrap">

        <div class="mascota-avatar-ring" onclick="document.getElementById('fotoFile').click()" title="Cambiar foto">
          <div class="mascota-avatar">

            <!-- Foto existente -->
            <img th:if="${mascota.fotoUrl != null and !#strings.isEmpty(mascota.fotoUrl)}"
                 id="fotoAvatarImg"
                 th:src="${mascota.fotoUrl}"
                 alt="Foto de la mascota">

            <!-- Placeholder cuando no hay foto -->
            <div th:if="${mascota.fotoUrl == null or #strings.isEmpty(mascota.fotoUrl)}"
                 id="fotoAvatarPlaceholder"
                 class="mascota-avatar-placeholder">
              <i class="bi bi-paw-fill"></i>
              <span>Sin foto</span>
            </div>

            <!-- Overlay de cámara al hover -->
            <div class="mascota-avatar-overlay">
              <i class="bi bi-camera-fill"></i>
              <span th:text="${mascota.id == null} ? 'Subir foto' : 'Cambiar foto'">Subir foto</span>
            </div>
          </div>
        </div>

        <div class="mascota-avatar-hint">
          <i class="bi bi-camera"></i>
          <span th:text="${mascota.id == null} ? 'Haz clic en la imagen para subir una foto' : 'Haz clic en la imagen para cambiar la foto'">
            Haz clic en la imagen para subir una foto
          </span>
        </div>
        <span class="mascota-avatar-formats">JPG · PNG · WEBP · máx. 5 MB</span>

        <!-- Campo file oculto — se activa al clicar el avatar -->
        <input type="file" id="fotoFile" name="fotoFile" accept="image/*" style="display:none;">

        <!-- Preserva la URL existente al enviar sin nueva foto -->
        <input type="hidden" th:field="*{fotoUrl}">

        <div th:if="${errorFoto}" class="text-danger small" th:text="${errorFoto}"></div>
      </div>
      <!-- ── / Foto ──────────────────────────────────────────────────────────── -->

      <div class="row g-3 mt-1">

        <!-- Nombre -->
        <div class="col-md-6">
          <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text"
                 id="nombre"
                 th:field="*{nombre}"
                 th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Nombre de la mascota"
                 maxlength="100">
          <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
            <span th:errors="*{nombre}"></span>
          </div>
        </div>

        <!-- Fecha de nacimiento -->
        <div class="col-md-3">
          <label for="fechaNacimiento" class="form-label fw-semibold">Fecha de nacimiento</label>
          <input type="date"
                 id="fechaNacimiento"
                 th:field="*{fechaNacimiento}"
                 class="form-control">
        </div>

        <!-- Sexo -->
        <div class="col-md-3">
          <label for="sexo" class="form-label fw-semibold">Sexo <span class="text-danger">*</span></label>
          <select id="sexo"
                  th:field="*{sexo}"
                  th:classappend="${#fields.hasErrors('sexo')} ? 'is-invalid'"
                  class="form-select">
            <option value="Desconocido">Desconocido</option>
            <option value="M">Macho</option>
            <option value="F">Hembra</option>
          </select>
          <div th:if="${#fields.hasErrors('sexo')}" class="invalid-feedback">
            <span th:errors="*{sexo}"></span>
          </div>
        </div>

        <!-- Color -->
        <div class="col-md-6">
          <label for="color" class="form-label fw-semibold">Color / pelaje</label>
          <input type="text"
                 id="color"
                 th:field="*{color}"
                 class="form-control"
                 placeholder="Ej: Negro con manchas blancas"
                 maxlength="80">
        </div>

        <!-- Propietario -->
        <div class="col-md-6">
          <label for="idPropietario" class="form-label fw-semibold">Propietario <span class="text-danger">*</span></label>
          <select id="idPropietario"
                  th:field="*{idPropietario}"
                  th:classappend="${#fields.hasErrors('idPropietario')} ? 'is-invalid'"
                  class="form-select">
            <option value="">-- Seleccione un propietario --</option>
            <option th:each="p : ${propietarios}"
                    th:value="${p.id}"
                    th:text="${p.nombreCompleto}">
            </option>
          </select>
          <div th:if="${#fields.hasErrors('idPropietario')}" class="invalid-feedback">
            <span th:errors="*{idPropietario}"></span>
          </div>
        </div>

        <!-- Especie -->
        <div class="col-md-6">
          <label for="idEspecie" class="form-label fw-semibold">Especie <span class="text-danger">*</span></label>
          <select id="idEspecie"
                  th:field="*{idEspecie}"
                  th:classappend="${#fields.hasErrors('idEspecie')} ? 'is-invalid'"
                  class="form-select">
            <option value="">-- Seleccione una especie --</option>
            <option th:each="especie : ${especies}"
                    th:value="${especie.id}"
                    th:text="${especie.nombre}">
            </option>
          </select>
          <div th:if="${#fields.hasErrors('idEspecie')}" class="invalid-feedback">
            <span th:errors="*{idEspecie}"></span>
          </div>
        </div>

        <!-- Raza (filtrada por especie vía JS) -->
        <div class="col-md-6">
          <label for="idRaza" class="form-label fw-semibold">
            Raza <small class="text-muted">(opcional)</small>
          </label>
          <select id="idRaza"
                  th:field="*{idRaza}"
                  class="form-select">
            <option value="">Sin raza / Mestizo</option>
            <option th:each="raza : ${razas}"
                    th:value="${raza.id}"
                    th:text="${raza.nombre}"
                    th:attr="data-id-especie=${raza.idEspecie}">
            </option>
          </select>
          <small class="text-muted">Seleccione primero una especie para ver sus razas.</small>
        </div>

        <!-- Activo (solo en edición) -->
        <div class="col-12" th:if="${mascota.id != null}">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
            <label class="form-check-label fw-semibold" for="activo">Activo</label>
          </div>
        </div>

      </div><!-- /row -->

      <!-- Acciones -->
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn-ps-primary">
          <i class="bi bi-floppy-fill"></i>
          <span th:text="${mascota.id == null} ? 'Guardar' : 'Actualizar'"></span>
        </button>
        <a th:href="@{/mascotas}" class="btn-ps-outline">Cancelar</a>
      </div>

    </form>
  </div>

  <script>
    (function () {
      // ── Filtro de razas por especie ──────────────────────────────────────────
      const especieSelect = document.getElementById('idEspecie');
      const razaSelect    = document.getElementById('idRaza');
      const razaOpciones  = Array.from(razaSelect.options).slice(1);

      function filtrarRazas() {
        const idEsp = especieSelect.value;
        razaOpciones.forEach(function (opt) {
          const coincide = opt.dataset.idEspecie === idEsp;
          opt.hidden   = !coincide;
          opt.disabled = !coincide;
        });
        const razaActual = razaSelect.options[razaSelect.selectedIndex];
        if (razaActual && razaActual.dataset.idEspecie &&
            razaActual.dataset.idEspecie !== idEsp) {
          razaSelect.value = '';
        }
      }

      especieSelect.addEventListener('change', filtrarRazas);
      filtrarRazas();

      // ── Avatar: vista previa al seleccionar archivo ──────────────────────────
      document.getElementById('fotoFile').addEventListener('change', function () {
        if (!this.files || !this.files[0]) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const avatar = document.querySelector('.mascota-avatar');

          // Ocultar placeholder si existe
          const placeholder = document.getElementById('fotoAvatarPlaceholder');
          if (placeholder) placeholder.style.display = 'none';

          // Actualizar o crear el <img> del avatar
          let img = document.getElementById('fotoAvatarImg');
          if (!img) {
            img = document.createElement('img');
            img.id = 'fotoAvatarImg';
            avatar.insertBefore(img, avatar.firstChild);
          }
          img.src = e.target.result;
        };
        reader.readAsDataURL(this.files[0]);
      });
    })();
  </script>

</main>
</body>
</html>
