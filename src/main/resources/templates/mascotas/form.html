<!doctype html>
<html th:replace="~{layout/base :: layout(${mascota.id == null} ? 'Nueva Mascota' : 'Editar Mascota', ~{::main})}"
      lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='mascotas'"
      style="display:flex; flex-direction:column; min-height:calc(100vh - var(--topbar-height));">

  <style>
    /* ── Avatar de foto de mascota ────────────────────────────────────────────── */
    .mascota-avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid var(--ps-border);
      margin-bottom: .5rem;
    }

    .mascota-avatar-ring {
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ps-primary) 0%, #60a5fa 100%);
      box-shadow: 0 4px 18px rgba(37, 99, 235, .25);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
      cursor: pointer;
      position: relative;
    }

    .mascota-avatar-ring:hover {
      transform: scale(1.07) translateY(-3px);
      box-shadow: 0 10px 32px rgba(37, 99, 235, .4);
    }

    .mascota-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--ps-primary-light);
      border: 4px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mascota-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mascota-avatar-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      color: var(--ps-primary);
      opacity: .65;
    }

    .mascota-avatar-placeholder i {
      font-size: 2.8rem;
    }

    .mascota-avatar-placeholder span {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* Overlay al hacer hover: ícono de cámara */
    .mascota-avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(37, 99, 235, .55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      transition: opacity .25s ease;
      gap: .25rem;
    }

    .mascota-avatar-overlay i {
      font-size: 1.8rem;
    }

    .mascota-avatar-overlay span {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .04em;
    }

    .mascota-avatar-ring:hover .mascota-avatar-overlay {
      opacity: 1;
    }

    .mascota-avatar-hint {
      font-size: .78rem;
      color: var(--ps-text-muted);
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    .mascota-avatar-hint i {
      font-size: .85rem;
      color: var(--ps-primary);
    }

    .mascota-avatar-formats {
      font-size: .72rem;
      color: var(--ps-text-light);
    }
  </style>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: .5rem 0 2rem;">

    <div style="width:100%; max-width:760px; text-align:center; margin-bottom:1.25rem; padding: 0 1rem;">
      <h1 class="page-title" th:text="${mascota.id == null} ? 'Nueva Mascota' : 'Editar Mascota'"></h1>
      <p class="page-subtitle" style="margin-bottom:0;">Pacientes registrados en la clínica</p>
    </div>

  <div class="ps-card" style="max-width: 760px; width:100%;">
    <form th:action="${mascota.id == null} ? @{/mascotas} : @{/mascotas/{id}/editar(id=${mascota.id})}"
          th:object="${mascota}"
          method="post"
          enctype="multipart/form-data"
          novalidate>

      <!-- ── Foto protagonista ──────────────────────────────────────────────── -->
      <!-- ── Volver ──────────────────────────────────────────────────────────── -->
      <div class="mb-1">
        <a th:href="@{/mascotas}"
           style="display:inline-flex; align-items:center; gap:.35rem; font-size:.82rem;
                  font-weight:600; color:var(--ps-text-muted); text-decoration:none;
                  transition:color .2s;"
           onmouseover="this.style.color='var(--ps-primary)'"
           onmouseout="this.style.color='var(--ps-text-muted)'">
          <i class="bi bi-arrow-left"></i> Volver al listado
        </a>
      </div>

      <!-- ── Layout dos columnas: izquierda campos / derecha imágenes ──────────── -->
      <div style="display:flex; gap:1.25rem; align-items:stretch;">

        <!-- ── Columna izquierda: avatar + campos + botones ───────────────────── -->
        <div style="flex:0 0 56%; display:flex; flex-direction:column;">

          <!-- Avatar compacto -->
          <div class="mascota-avatar-wrap" style="padding:.6rem 0 .7rem;">

            <div class="mascota-avatar-ring" onclick="document.getElementById('fotoFile').click()" title="Cambiar foto">
              <div class="mascota-avatar">
                <img th:if="${mascota.fotoUrl != null and !#strings.isEmpty(mascota.fotoUrl)}"
                     id="fotoAvatarImg"
                     th:src="${mascota.fotoUrl}"
                     alt="Foto de la mascota">
                <div th:if="${mascota.fotoUrl == null or #strings.isEmpty(mascota.fotoUrl)}"
                     id="fotoAvatarPlaceholder"
                     class="mascota-avatar-placeholder">
                  <i class="bi bi-heart-fill"></i>
                  <span>Sin foto</span>
                </div>
                <div class="mascota-avatar-overlay">
                  <i class="bi bi-camera-fill"></i>
                  <span th:text="${mascota.id == null} ? 'Subir foto' : 'Cambiar foto'">Subir foto</span>
                </div>
              </div>
            </div>

            <div class="mascota-avatar-hint">
              <i class="bi bi-camera"></i>
              <span th:text="${mascota.id == null} ? 'Haz clic en la imagen para subir una foto' : 'Haz clic en la imagen para cambiar la foto'">
                Haz clic en la imagen para subir una foto
              </span>
            </div>
            <span class="mascota-avatar-formats">JPG · PNG · WEBP · máx. 5 MB</span>

            <input type="file" id="fotoFile" name="fotoFile" accept="image/*" style="display:none;">
            <input type="hidden" th:field="*{fotoUrl}">
            <div th:if="${errorFoto}" class="text-danger small" th:text="${errorFoto}"></div>
          </div>

          <!-- Campos -->
          <div class="row g-2 mt-1" style="flex:1;">

            <!-- Nombre -->
            <div class="col-12">
              <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" id="nombre" th:field="*{nombre}"
                     th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                     class="form-control" placeholder="Nombre de la mascota" maxlength="100">
              <div th:if="${#fields.hasErrors('nombre')}" class="invalid-feedback">
                <span th:errors="*{nombre}"></span>
              </div>
            </div>

            <!-- Fecha + Sexo -->
            <div class="col-7">
              <label for="fechaNacimiento" class="form-label fw-semibold">Fecha de nacimiento</label>
              <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" class="form-control">
            </div>
            <div class="col-5">
              <label for="sexo" class="form-label fw-semibold">Sexo <span class="text-danger">*</span></label>
              <select id="sexo" th:field="*{sexo}"
                      th:classappend="${#fields.hasErrors('sexo')} ? 'is-invalid'"
                      class="form-select">
                <option value="Desconocido">Desconocido</option>
                <option value="M">Macho</option>
                <option value="F">Hembra</option>
              </select>
              <div th:if="${#fields.hasErrors('sexo')}" class="invalid-feedback">
                <span th:errors="*{sexo}"></span>
              </div>
            </div>

            <!-- Color -->
            <div class="col-12">
              <label for="color" class="form-label fw-semibold">Color / pelaje</label>
              <input type="text" id="color" th:field="*{color}" class="form-control"
                     placeholder="Ej: Negro con manchas blancas" maxlength="80">
            </div>

            <!-- Propietario -->
            <div class="col-12">
              <label for="idPropietario" class="form-label fw-semibold">Propietario <span class="text-danger">*</span></label>
              <select id="idPropietario" th:field="*{idPropietario}"
                      th:classappend="${#fields.hasErrors('idPropietario')} ? 'is-invalid'"
                      class="form-select">
                <option value="">-- Seleccione un propietario --</option>
                <option th:each="p : ${propietarios}" th:value="${p.id}" th:text="${p.nombreCompleto}"></option>
              </select>
              <div th:if="${#fields.hasErrors('idPropietario')}" class="invalid-feedback">
                <span th:errors="*{idPropietario}"></span>
              </div>
            </div>

            <!-- Especie -->
            <div class="col-12">
              <label for="idEspecie" class="form-label fw-semibold">Especie <span class="text-danger">*</span></label>
              <select id="idEspecie" th:field="*{idEspecie}"
                      th:classappend="${#fields.hasErrors('idEspecie')} ? 'is-invalid'"
                      class="form-select">
                <option value="" data-foto="">-- Seleccione una especie --</option>
                <option th:each="especie : ${especies}"
                        th:value="${especie.id}"
                        th:text="${especie.nombre}"
                        th:attr="data-foto=${especie.fotoUrl}">
                </option>
              </select>
              <div th:if="${#fields.hasErrors('idEspecie')}" class="invalid-feedback">
                <span th:errors="*{idEspecie}"></span>
              </div>
            </div>

            <!-- Raza -->
            <div class="col-12">
              <label for="idRaza" class="form-label fw-semibold">
                Raza <small class="text-muted">(opcional)</small>
              </label>
              <select id="idRaza" th:field="*{idRaza}" class="form-select">
                <option value="" data-foto="" data-id-especie="">Sin raza / Mestizo</option>
                <option th:each="raza : ${razas}"
                        th:value="${raza.id}"
                        th:text="${raza.nombre}"
                        th:attr="data-id-especie=${raza.idEspecie}, data-foto=${raza.fotoUrl}">
                </option>
              </select>
              <small class="text-muted">Seleccione primero una especie para ver sus razas.</small>
            </div>

            <!-- Activo -->
            <div class="col-12" th:if="${mascota.id != null}">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
                <label class="form-check-label fw-semibold" for="activo">Activo</label>
              </div>
            </div>

          </div><!-- /row campos -->

          <!-- Botones -->
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn-ps-primary">
              <i class="bi bi-floppy-fill"></i>
              <span th:text="${mascota.id == null} ? 'Guardar' : 'Actualizar'"></span>
            </button>
            <a th:href="@{/mascotas}" class="btn-ps-outline">Cancelar</a>
          </div>

        </div><!-- /columna izquierda -->

        <!-- ── Columna derecha: imágenes de especie y raza ────────────────────── -->
        <div style="flex:1; display:flex; flex-direction:column; gap:.75rem;">

          <!-- Imagen especie -->
          <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
            <div style="flex:1; border-radius:var(--radius-md); overflow:hidden;
                        border:1px solid var(--ps-border); background:var(--ps-primary-light);
                        display:flex; align-items:center; justify-content:center; position:relative;
                        min-height:0;">
              <img id="especiePreviewImg" alt="Especie"
                   style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none;">
              <span id="especiePreviewPh" style="color:var(--ps-primary); font-size:2.8rem; opacity:.35;">
                <i class="bi bi-image"></i>
              </span>
            </div>
            <small id="especiePreviewNom"
                   style="display:block; text-align:center; font-size:.73rem;
                          color:var(--ps-text-muted); font-weight:600; margin-top:.3rem;"></small>
          </div>

          <!-- Imagen raza -->
          <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
            <div style="flex:1; border-radius:var(--radius-md); overflow:hidden;
                        border:1px solid var(--ps-border); background:var(--ps-primary-light);
                        display:flex; align-items:center; justify-content:center; position:relative;
                        min-height:0;">
              <img id="razaPreviewImg" alt="Raza"
                   style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none;">
              <span id="razaPreviewPh" style="color:var(--ps-primary); font-size:2.8rem; opacity:.35;">
                <i class="bi bi-image"></i>
              </span>
            </div>
            <small id="razaPreviewNom"
                   style="display:block; text-align:center; font-size:.73rem;
                          color:var(--ps-text-muted); font-weight:600; margin-top:.3rem;"></small>
          </div>

        </div><!-- /columna derecha -->

      </div><!-- /layout dos columnas -->

    </form>
  </div>

  <script>
    (function () {
      // ── Filtro de razas por especie ──────────────────────────────────────────
      const especieSelect = document.getElementById('idEspecie');
      const razaSelect    = document.getElementById('idRaza');
      const razaOpciones  = Array.from(razaSelect.options).slice(1);

      function filtrarRazas() {
        const idEsp = especieSelect.value;
        razaOpciones.forEach(function (opt) {
          const coincide = opt.dataset.idEspecie === idEsp;
          opt.hidden   = !coincide;
          opt.disabled = !coincide;
        });
        const razaActual = razaSelect.options[razaSelect.selectedIndex];
        if (razaActual && razaActual.dataset.idEspecie &&
            razaActual.dataset.idEspecie !== idEsp) {
          razaSelect.value = '';
        }
        actualizarPreview(razaSelect, 'razaPreviewImg', 'razaPreviewPh', 'razaPreviewNom');
      }

      especieSelect.addEventListener('change', filtrarRazas);
      filtrarRazas();

      // ── Previews de especie y raza ───────────────────────────────────────────
      function actualizarPreview(select, imgId, phId, nomId) {
        const opt  = select.options[select.selectedIndex];
        const foto = opt ? (opt.getAttribute('data-foto') || '') : '';
        const img  = document.getElementById(imgId);
        const ph   = document.getElementById(phId);
        const nom  = document.getElementById(nomId);
        if (foto) {
          img.src = foto;
          img.style.display = 'block';
          ph.style.display  = 'none';
          nom.textContent   = opt.textContent.trim();
        } else {
          img.style.display = 'none';
          ph.style.display  = '';
          nom.textContent   = '';
        }
      }

      especieSelect.addEventListener('change', function () {
        actualizarPreview(this, 'especiePreviewImg', 'especiePreviewPh', 'especiePreviewNom');
      });
      razaSelect.addEventListener('change', function () {
        actualizarPreview(this, 'razaPreviewImg', 'razaPreviewPh', 'razaPreviewNom');
      });
      // Cargar previews con los valores actuales al abrir el formulario
      actualizarPreview(especieSelect, 'especiePreviewImg', 'especiePreviewPh', 'especiePreviewNom');
      actualizarPreview(razaSelect,    'razaPreviewImg',    'razaPreviewPh',    'razaPreviewNom');

      // ── Avatar: vista previa al seleccionar archivo ──────────────────────────
      document.getElementById('fotoFile').addEventListener('change', function () {
        if (!this.files || !this.files[0]) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const avatar = document.querySelector('.mascota-avatar');

          // Ocultar placeholder si existe
          const placeholder = document.getElementById('fotoAvatarPlaceholder');
          if (placeholder) placeholder.style.display = 'none';

          // Actualizar o crear el <img> del avatar
          let img = document.getElementById('fotoAvatarImg');
          if (!img) {
            img = document.createElement('img');
            img.id = 'fotoAvatarImg';
            avatar.insertBefore(img, avatar.firstChild);
          }
          img.src = e.target.result;
        };
        reader.readAsDataURL(this.files[0]);
      });
    })();
  </script>

  </div><!-- /centering wrapper -->

</main>
</body>
</html>
