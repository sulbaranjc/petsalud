<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar" class="sidebar">

  <!-- Marca / Logo -->
  <div class="sidebar-brand">
    <svg class="brand-logo"
         xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 40 40"
         width="38" height="38"
         aria-label="PetSalud logo"
         role="img">
      <defs>
        <linearGradient id="ps-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#4f94f8"/>
          <stop offset="100%" stop-color="#1a3a8f"/>
        </linearGradient>
      </defs>
      <rect width="40" height="40" rx="9" fill="url(#ps-grad)"/>
      <ellipse cx="9.5"  cy="20"   rx="4.2" ry="3.3" fill="white" opacity=".92" transform="rotate(28  9.5 20)"/>
      <ellipse cx="16"   cy="13"   rx="3.6" ry="2.8" fill="white" opacity=".92" transform="rotate(10  16 13)"/>
      <ellipse cx="24"   cy="13"   rx="3.6" ry="2.8" fill="white" opacity=".92" transform="rotate(-10 24 13)"/>
      <ellipse cx="30.5" cy="20"   rx="4.2" ry="3.3" fill="white" opacity=".92" transform="rotate(-28 30.5 20)"/>
      <ellipse cx="20" cy="29" rx="8" ry="6.5" fill="white" opacity=".92"/>
      <rect x="18.2" y="24.5" width="3.6" height="9"   rx="1.4" fill="#1a3a8f"/>
      <rect x="15.5" y="27.2" width="9"   height="3.6" rx="1.4" fill="#1a3a8f"/>
    </svg>
    <span class="brand-name">
      <span class="brand-pet">Pet</span><span class="brand-salud">Salud</span>
    </span>
  </div>

  <!-- Navegación -->
  <nav class="sidebar-nav">

    <!-- Principal -->
    <span class="nav-section-label">Principal</span>

    <a th:href="@{/}" class="sidebar-link"
       th:classappend="${activePage == 'dashboard'} ? ' active'">
      <i class="bi bi-grid-1x2-fill"></i>
      <span>Dashboard</span>
    </a>

    <!-- Operativo -->
    <span class="nav-section-label">Operativo</span>

    <a th:href="@{/citas}" class="sidebar-link"
       th:classappend="${activePage == 'citas'} ? ' active'">
      <i class="bi bi-calendar2-check-fill"></i>
      <span>Citas</span>
    </a>

    <a th:href="@{/consultas}" class="sidebar-link"
       th:classappend="${activePage == 'consultas'} ? ' active'">
      <i class="bi bi-clipboard2-pulse-fill"></i>
      <span>Consultas</span>
    </a>

    <!-- Pacientes -->
    <span class="nav-section-label">Pacientes</span>

    <a th:href="@{/mascotas}" class="sidebar-link"
       th:classappend="${activePage == 'mascotas'} ? ' active'">
      <i>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 494.585 494.585" width="1em" height="1em" fill="currentColor" aria-hidden="true">
          <path d="M314.438,52.675c-21.633,0-39.144,0-39.144,0l-12.13-37.248c-6.664-20.57-17.529-20.57-24.18,0c-6.725,20.582-12.125,37.248-12.125,37.248h-39.176c-21.632,0-24.985,10.329-7.486,23.035c17.543,12.685,31.708,23.009,31.708,23.009l-12.135,37.248c-6.669,20.577,2.105,26.959,19.639,14.241c17.474-12.713,31.652-23.025,31.652-23.025l31.676,23.025c17.502,12.708,26.257,6.336,19.588-14.241c-6.679-20.582-12.088-37.248-12.088-37.248l31.699-23.009C339.41,63.004,336.06,52.675,314.438,52.675z"/>
          <path d="M168.852,185.596c0,0-14.736,9.89-19.963,57.937c27.557,35.685,61.804,29.851,76.883,24.871c1.37-0.462,3.099-2.697,3.19-4.121c2.002-34.308-26.327-80.045-36.532-95.313C184.221,172.241,176.231,177.534,168.852,185.596z"/>
          <path d="M313.261,96.497l4.91,15.135c3.234,9.995,3.743,18.505,1.899,25.62c57.069,27.305,96.679,85.438,96.679,152.797c0,93.449-76.022,169.467-169.464,169.467c-0.997,0-1.976-0.14-2.961-0.159l-0.272-6.318c-0.126-2.824,1.92-5.923,4.564-6.908l32.789-12.302c0,0,15.378,0.858,21.776-10.684c3.239-5.819,6.25-9.885,8.457-12.507c1.811-2.156,1.787-5.232-0.247-7.202c-6.692-6.482-20.167-20.68-21.44-31.53c-1.713-14.524-22.201-26.486-48.689-28.189c0,0-14.064-10.813-15.01-29.473c-0.151-2.828-2.263-5.638-5.01-4.956c-7.08,1.736-19.093,10.827-19.69,52.332c0,0-37.61,19.06-41.115,73.679c-2.994-1.792-5.993-3.561-8.865-5.54c1.367-16.601,5.563-29.827,10.478-39.81c9.756-19.835,23.452-30.863,30.438-35.517c1.505-40.968,14.799-52.938,25.9-55.679c3.409-0.84,6.987-0.111,9.822,2.007c3.228,2.404,5.283,6.361,5.502,10.613c0.57,11.01,7.078,18.738,10.167,21.81c5.001,0.462,9.78,1.26,14.27,2.352l0.42-3.864l3.431-33.374c0.583-5.629,5.651-10.385,11.252-11.183c21.277-3.099,68.686-15.704,71.771-66.923c0.341-5.657-4.42-11.338-9.927-12.678l-45.131-11.019c0,0-1.288-10.893-14.095-15.371c-9.334-3.274-41.488-21.742-73.121-15.227c11.959,18.206,38.566,63.083,36.464,98.979c-0.315,5.647-4.805,11.477-10.195,13.255c-5.181,1.717-14.489,4.116-25.8,4.116c-16.386,0-36.963-5.036-55.505-24.414c-0.364,6.151-0.572,12.816-0.607,20.018c-0.21,37.164-47.415,72.4-47.415,72.4l-5.638,11.672c-10.284-21.86-16.209-46.152-16.209-71.873c0-69.08,41.595-128.541,101.007-154.9c-1.234-6.697-0.637-14.463,2.298-23.524l5.521-16.939c-83.282,25.891-143.91,103.672-143.91,195.364c0,112.775,91.757,204.535,204.535,204.535c112.778,0,204.532-91.76,204.532-204.535C451.817,200.351,393.759,124.012,313.261,96.497z M270.496,374.449c3.184,0,5.769,2.572,5.769,5.769c0,3.192-2.585,5.765-5.769,5.765c-3.183,0-5.764-2.572-5.764-5.765C264.732,377.021,267.313,374.449,270.496,374.449z M264.732,207.882c3.192,0,5.764,2.576,5.764,5.766c0,3.19-2.571,5.762-5.764,5.762c-3.196,0-5.773-2.571-5.773-5.762C258.964,210.458,261.55,207.882,264.732,207.882z"/>
        </svg>
      </i>
      <span>Mascotas</span>
    </a>

    <a th:href="@{/propietarios}" class="sidebar-link"
       th:classappend="${activePage == 'propietarios'} ? ' active'">
      <i class="bi bi-people-fill"></i>
      <span>Propietarios</span>
    </a>

    <a th:href="@{/vacunaciones}" class="sidebar-link"
       th:classappend="${activePage == 'vacunaciones'} ? ' active'">
      <i class="bi bi-shield-fill-plus"></i>
      <span>Vacunaciones</span>
    </a>

    <!-- Personal -->
    <span class="nav-section-label">Personal</span>

    <a th:href="@{/veterinarios}" class="sidebar-link"
       th:classappend="${activePage == 'veterinarios'} ? ' active'">
      <i class="bi bi-person-badge-fill"></i>
      <span>Veterinarios</span>
    </a>

    <!-- Catálogos (colapsable) -->
    <span class="nav-section-label">Catálogos</span>

    <button class="sidebar-link sidebar-collapse-btn"
            data-bs-toggle="collapse"
            data-bs-target="#menu-catalogos"
            th:attr="aria-expanded=${activePage != null and activePage.startsWith('cat-')} ? 'true' : 'false'"
            th:classappend="${activePage != null and activePage.startsWith('cat-')} ? ' active'">
      <i class="bi bi-collection-fill"></i>
      <span>Catálogos</span>
      <i class="bi bi-chevron-down collapse-chevron"></i>
    </button>

    <div class="collapse sidebar-submenu"
         id="menu-catalogos"
         th:classappend="${activePage != null and activePage.startsWith('cat-')} ? ' show'">

      <a th:href="@{/catalogos/especies}" class="sidebar-link"
         th:classappend="${activePage == 'cat-especies'} ? ' active'">
        <i class="bi bi-diagram-3-fill"></i>
        <span>Especies</span>
      </a>

      <a th:href="@{/catalogos/razas}" class="sidebar-link"
         th:classappend="${activePage == 'cat-razas'} ? ' active'">
        <i class="bi bi-tags-fill"></i>
        <span>Razas</span>
      </a>

      <a th:href="@{/catalogos/especialidades}" class="sidebar-link"
         th:classappend="${activePage == 'cat-especialidades'} ? ' active'">
        <i class="bi bi-award-fill"></i>
        <span>Especialidades</span>
      </a>

      <a th:href="@{/catalogos/medicamentos}" class="sidebar-link"
         th:classappend="${activePage == 'cat-medicamentos'} ? ' active'">
        <i class="bi bi-capsule-pill"></i>
        <span>Medicamentos</span>
      </a>

      <a th:href="@{/catalogos/vacunas}" class="sidebar-link"
         th:classappend="${activePage == 'cat-vacunas'} ? ' active'">
        <i class="bi bi-droplet-fill"></i>
        <span>Vacunas</span>
      </a>

    </div>

    <!-- Sistema -->
    <span class="nav-section-label">Sistema</span>

    <a th:href="@{/configuracion}" class="sidebar-link"
       th:classappend="${activePage == 'configuracion'} ? ' active'">
      <i class="bi bi-gear-fill"></i>
      <span>Configuración</span>
    </a>

  </nav>

  <!-- Pie del sidebar -->
  <div class="sidebar-footer">
    <a href="#" class="sidebar-link">
      <i class="bi bi-box-arrow-left"></i>
      <span>Cerrar sesión</span>
    </a>
  </div>

</aside>

</body>
</html>
