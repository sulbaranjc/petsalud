<!doctype html>
<html th:replace="~{layout/base :: layout('Consultas', ~{::main})}" lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<main th:with="activePage='consultas'">

  <style>
    .mascota-list-avatar {
      width: 42px; height: 42px;
      border-radius: 50%; object-fit: cover;
      border: 2px solid var(--ps-border); flex-shrink: 0;
      transition: border-color .2s, transform .2s;
    }
    .mascota-list-avatar-placeholder {
      width: 42px; height: 42px;
      border-radius: 50%; background: var(--ps-primary-light);
      border: 2px solid var(--ps-border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--ps-primary); font-size: .95rem; opacity: .8;
      transition: border-color .2s, transform .2s;
    }
    .ps-table tbody tr:hover .mascota-list-avatar,
    .ps-table tbody tr:hover .mascota-list-avatar-placeholder {
      border-color: var(--ps-primary); transform: scale(1.08);
    }
    .mascota-nombre-cell { display: flex; align-items: center; gap: .65rem; }
  </style>

  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title">Consultas</h1>
      <p class="page-subtitle">Historial de consultas médicas registradas</p>
    </div>
  </div>

  <!-- Mensaje flash -->
  <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${mensajeExito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Filtros -->
  <form th:action="@{/consultas}" method="get">
    <div class="ps-card filter-bar">
      <div class="row g-2 align-items-center">
        <div class="col-md-5">
          <div class="filter-search-wrap">
            <i class="bi bi-search"></i>
            <input type="text" name="q" class="filter-input"
                   placeholder="Buscar por mascota, propietario, veterinario, diagnóstico..."
                   th:value="${q}">
          </div>
        </div>
        <div class="col-md-4">
          <select name="idVeterinario" class="filter-select">
            <option value="">Todos los veterinarios</option>
            <option th:each="vet : ${veterinarios}"
                    th:value="${vet.id}"
                    th:text="${vet.nombreCompleto}"
                    th:selected="${vet.id == idVeterinarioFiltro}">
            </option>
          </select>
        </div>
        <div class="col-md-3 d-flex gap-2 justify-content-end">
          <button type="submit" class="btn-ps-outline"><i class="bi bi-funnel"></i> Filtrar</button>
          <a th:href="@{/consultas}" class="btn-ps-outline"><i class="bi bi-x-lg"></i> Limpiar</a>
        </div>
      </div>
    </div>
  </form>

  <!-- Tabla -->
  <div class="ps-card">
    <table class="ps-table">
      <thead>
        <tr>
          <th th:with="col='mascota', nextDir=${sortBy == 'mascota' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc'}">
            <a th:href="@{/consultas(q=${q}, idVeterinario=${idVeterinarioFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Mascota
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th>Propietario</th>
          <th th:with="col='veterinario', nextDir=${sortBy == 'veterinario' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc'}">
            <a th:href="@{/consultas(q=${q}, idVeterinario=${idVeterinarioFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Veterinario
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th th:with="col='fecha', nextDir=${sortBy == 'fecha' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'desc'}">
            <a th:href="@{/consultas(q=${q}, idVeterinario=${idVeterinarioFiltro}, sortBy=${col}, sortDir=${nextDir}, page=1)}"
               th:class="${sortBy == col} ? 'sort-link sort-link-active' : 'sort-link'">
              Fecha
              <i th:if="${sortBy == col and sortDir == 'asc'}"  class="bi bi-sort-up-alt sort-icon"></i>
              <i th:if="${sortBy == col and sortDir == 'desc'}" class="bi bi-sort-down-alt sort-icon"></i>
              <i th:unless="${sortBy == col}" class="bi bi-arrow-down-up sort-icon"></i>
            </a>
          </th>
          <th>Diagnóstico</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="con : ${consultas}">
          <td>
            <div class="mascota-nombre-cell">
              <img th:if="${con.fotoUrlMascota != null and !#strings.isEmpty(con.fotoUrlMascota)}"
                   th:src="${con.fotoUrlMascota}"
                   th:alt="${con.nombreMascota}"
                   class="mascota-list-avatar">
              <div th:if="${con.fotoUrlMascota == null or #strings.isEmpty(con.fotoUrlMascota)}"
                   class="mascota-list-avatar-placeholder"
                   th:title="${con.nombreMascota}">
                <i class="bi bi-paw-fill"></i>
              </div>
              <div>
                <strong th:text="${con.nombreMascota}"></strong>
                <small class="text-muted d-block" th:text="${con.nombreEspecie}"></small>
              </div>
            </div>
          </td>
          <td th:text="${con.nombrePropietario}"></td>
          <td th:text="${con.nombreVeterinario}"></td>
          <td th:text="${#temporals.format(con.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <span th:if="${con.diagnostico}"    th:text="${con.diagnostico}"   class="text-muted small"></span>
            <span th:unless="${con.diagnostico}" class="text-muted fst-italic">—</span>
          </td>
          <td>
            <div class="table-actions">
              <a th:href="@{/consultas/{id}(id=${con.id})}"
                 class="action-btn action-btn-info" title="Ver detalle">
                <i class="bi bi-eye-fill"></i>
              </a>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(consultas)}">
          <td colspan="6" class="text-center text-muted py-4">No hay consultas registradas.</td>
        </tr>
      </tbody>
    </table>

    <!-- Paginación -->
    <div class="ps-pagination">
      <span class="pagination-info"
            th:text="'Mostrando ' + ${pagina.from} + '–' + ${pagina.to}
                     + ' de ' + ${pagina.totalElements} + ' registros'">
      </span>
      <div class="pagination-controls">
        <a th:if="${pagina.hasPrevious()}"
           th:href="@{/consultas(q=${q}, idVeterinario=${idVeterinarioFiltro}, sortBy=${sortBy}, sortDir=${sortDir}, page=${pagina.pageNumber - 1})}"
           class="page-btn"><i class="bi bi-chevron-left"></i></a>
        <span th:unless="${pagina.hasPrevious()}" class="page-btn disabled"><i class="bi bi-chevron-left"></i></span>

        <th:block th:each="p : ${ventanaPaginas}">
          <span th:if="${p == -1}" class="page-ellipsis">…</span>
          <a th:unless="${p == -1}"
             th:href="@{/consultas(q=${q}, idVeterinario=${idVeterinarioFiltro}, sortBy=${sortBy}, sortDir=${sortDir}, page=${p})}"
             th:class="${p == pagina.pageNumber} ? 'page-btn active' : 'page-btn'"
             th:text="${p}"></a>
        </th:block>

        <a th:if="${pagina.hasNext()}"
           th:href="@{/consultas(q=${q}, idVeterinario=${idVeterinarioFiltro}, sortBy=${sortBy}, sortDir=${sortDir}, page=${pagina.pageNumber + 1})}"
           class="page-btn"><i class="bi bi-chevron-right"></i></a>
        <span th:unless="${pagina.hasNext()}" class="page-btn disabled"><i class="bi bi-chevron-right"></i></span>
      </div>
    </div>
  </div>

</main>
</body>
</html>
