spring.application.name=petsalud

# =============================================================================
# DataSource — las credenciales las lee DatabaseConfig via @Value
# =============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/petsalud?useSSL=false&serverTimezone=America/Bogota&characterEncoding=UTF-8
spring.datasource.username=petsalud
spring.datasource.password=petsalud
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =============================================================================
# Thymeleaf
# =============================================================================
spring.thymeleaf.cache=false
